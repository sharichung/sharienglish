<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Blender - Phonics Blending Game</title>
<style>
  :root {
    --sky: #87CEEB;
    --purple: #9B59B6;
    --pink: #FF69B4;
    --green: #2ECC71;
    --orange: #FF9F40;
    --yellow: #FFD93D;
    --red: #E74C3C;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Comic Sans MS", "Arial Rounded MT Bold", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .game-container {
    background: linear-gradient(180deg, #fff 0%, #f0f8ff 100%);
    border-radius: 30px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 1100px;
    width: 100%;
    padding: 30px;
    position: relative;
    overflow: hidden;
  }

  .game-container::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);
    border-radius: 50%;
    pointer-events: none;
  }

  h1 {
    text-align: center;
    font-size: clamp(2rem, 5vw, 3rem);
    color: #667eea;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
  }

  .subtitle {
    text-align: center;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: #666;
    margin-bottom: 20px;
  }

  .level-selector {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }

  .level-btn {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
    border: none;
    border-radius: 15px;
    padding: 12px 24px;
    font-size: clamp(1rem, 2.2vw, 1.2rem);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
  }

  .level-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(155, 89, 182, 0.6);
  }

  .level-btn.active {
    background: linear-gradient(135deg, var(--green), #27AE60);
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
  }

  .score-board {
    display: flex;
    justify-content: space-around;
    background: linear-gradient(135deg, #FFD93D, #FFA500);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 25px;
    box-shadow: 0 4px 15px rgba(255, 165, 0, 0.3);
  }

  .score-item {
    text-align: center;
    color: #333;
  }

  .score-label {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    font-weight: bold;
  }

  .score-value {
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
  }

  .blender-area {
    background: linear-gradient(180deg, #E8F5E9, #C8E6C9);
    border-radius: 25px;
    padding: 30px;
    margin-bottom: 25px;
    min-height: 350px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.1);
  }

  .letter-slots {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .letter-slot {
    width: clamp(70px, 10vw, 100px);
    height: clamp(70px, 10vw, 100px);
    background: white;
    border: 4px dashed #ccc;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: bold;
    color: #667eea;
    transition: all 0.3s;
    position: relative;
  }

  .letter-slot.filled {
    border: 4px solid var(--green);
    background: linear-gradient(135deg, #FFD93D, #FFA500);
    animation: letterDrop 0.5s ease-out;
  }

  @keyframes letterDrop {
    0% {
      transform: translateY(-200px) rotate(-10deg);
      opacity: 0;
    }
    60% {
      transform: translateY(10px) rotate(5deg);
    }
    100% {
      transform: translateY(0) rotate(0);
      opacity: 1;
    }
  }

  .blender-machine {
    width: clamp(150px, 30vw, 250px);
    height: clamp(180px, 35vw, 280px);
    background: linear-gradient(180deg, var(--purple), var(--pink));
    border-radius: 50% 50% 20% 20%;
    position: relative;
    margin: 20px 0;
    box-shadow: 0 10px 30px rgba(155, 89, 182, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .blender-machine::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 50%;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.2);
  }

  .blender-machine.blending {
    animation: shake 0.5s infinite;
  }

  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
  }

  .blended-word {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: bold;
    color: white;
    text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
    opacity: 0;
    transition: opacity 0.5s;
    position: relative;
    z-index: 1;
  }

  .blended-word.show {
    opacity: 1;
    animation: popIn 0.6s ease-out;
  }

  @keyframes popIn {
    0% {
      transform: scale(0);
    }
    50% {
      transform: scale(1.2);
    }
    100% {
      transform: scale(1);
    }
  }

  .action-buttons {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 15px 30px;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight: bold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    color: white;
    min-width: 150px;
  }

  .btn-blend {
    background: linear-gradient(135deg, var(--orange), var(--red));
  }

  .btn-blend:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(255, 99, 71, 0.4);
  }

  .btn-blend:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
  }

  .btn-hear {
    background: linear-gradient(135deg, #3498db, #2980b9);
  }

  .btn-hear:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
  }

  .btn-next {
    background: linear-gradient(135deg, var(--green), #27AE60);
  }

  .btn-next:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
  }

  .picture-choices {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .picture-choices.show {
    opacity: 1;
    pointer-events: auto;
  }

  .picture-card {
    background: white;
    border: 4px solid #ddd;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  }

  .picture-card:hover {
    transform: translateY(-5px);
    border-color: var(--purple);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
  }

  .picture-card.correct {
    border-color: var(--green);
    background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
    animation: celebrate 0.6s ease-out;
  }

  .picture-card.wrong {
    border-color: var(--red);
    animation: wrongShake 0.5s;
  }

  @keyframes celebrate {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  .picture-emoji {
    font-size: clamp(3rem, 8vw, 5rem);
    margin-bottom: 10px;
  }

  .picture-label {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: bold;
    color: #333;
  }

  .feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(4rem, 10vw, 8rem);
    z-index: 1000;
    pointer-events: none;
    transition: transform 0.3s;
  }

  .feedback.show {
    transform: translate(-50%, -50%) scale(1);
    animation: feedbackPulse 0.6s ease-out;
  }

  @keyframes feedbackPulse {
    0% { transform: translate(-50%, -50%) scale(0); }
    50% { transform: translate(-50%, -50%) scale(1.2); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: confettiFall 2s linear forwards;
  }

  @keyframes confettiFall {
    to {
      transform: translateY(100vh) rotate(720deg);
      opacity: 0;
    }
  }

  .progress-bar {
    background: #E0E0E0;
    border-radius: 15px;
    height: 20px;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
  }

  .progress-fill {
    background: linear-gradient(90deg, var(--green), var(--yellow));
    height: 100%;
    width: 0%;
    transition: width 0.5s ease;
    box-shadow: 0 2px 5px rgba(46, 204, 113, 0.3);
  }

  @media (max-width: 768px) {
    .game-container {
      padding: 20px;
    }

    .letter-slots {
      gap: 10px;
    }

    .action-buttons {
      flex-direction: column;
      align-items: stretch;
    }

    .btn {
      width: 100%;
    }
  }
</style>
</head>
<body>
  <div class="game-container">
    <h1>🎨 Magic Blender</h1>
    <p class="subtitle">Blend the sounds together to make words!</p>

    <div class="level-selector">
      <button class="level-btn active" data-level="cvc">Level 1: CVC</button>
      <button class="level-btn" data-level="ccvc">Level 2: Blends</button>
      <button class="level-btn" data-level="cvce">Level 3: Magic E</button>
    </div>

    <div class="score-board">
      <div class="score-item">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Streak 🔥</div>
        <div class="score-value" id="streak">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Question</div>
        <div class="score-value"><span id="current">1</span>/<span id="total">10</span></div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="blender-area">
      <div class="letter-slots" id="letterSlots"></div>

      <div class="blender-machine" id="blender">
        <div class="blended-word" id="blendedWord"></div>
      </div>

      <div class="action-buttons">
        <button class="btn btn-hear" id="hearSoundsBtn" style="display: none;">
          🔊 Hear Sounds Again
        </button>
        <button class="btn btn-blend" id="blendBtn" disabled>
          🌟 Blend It!
        </button>
        <button class="btn btn-next" id="nextBtn" style="display: none;">
          Next Word ➡️
        </button>
      </div>

      <div class="picture-choices" id="pictureChoices"></div>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>

<script>
  // Game State
  const gameState = {
    level: 'cvc',
    currentQuestionIndex: 0,
    score: 0,
    streak: 0,
    total: 10,
    currentWord: null,
    phase: 'listening', // 'listening', 'blended', 'choosing'
  };

  // Word Banks
  const wordBanks = {
    cvc: [
      { word: 'cat', sounds: ['c', 'a', 't'], pictures: [{emoji: '🐱', label: 'cat', correct: true}, {emoji: '🐕', label: 'dog'}, {emoji: '🐭', label: 'rat'}, {emoji: '🦊', label: 'fox'}]},
      { word: 'dog', sounds: ['d', 'o', 'g'], pictures: [{emoji: '🐕', label: 'dog', correct: true}, {emoji: '🐱', label: 'cat'}, {emoji: '🐷', label: 'pig'}, {emoji: '🐸', label: 'frog'}]},
      { word: 'sun', sounds: ['s', 'u', 'n'], pictures: [{emoji: '☀️', label: 'sun', correct: true}, {emoji: '🌙', label: 'moon'}, {emoji: '⭐', label: 'star'}, {emoji: '☁️', label: 'cloud'}]},
      { word: 'bat', sounds: ['b', 'a', 't'], pictures: [{emoji: '🦇', label: 'bat', correct: true}, {emoji: '🐱', label: 'cat'}, {emoji: '🐀', label: 'rat'}, {emoji: '🐰', label: 'rabbit'}]},
      { word: 'pen', sounds: ['p', 'e', 'n'], pictures: [{emoji: '🖊️', label: 'pen', correct: true}, {emoji: '✏️', label: 'pencil'}, {emoji: '🖍️', label: 'crayon'}, {emoji: '📏', label: 'ruler'}]},
      { word: 'cup', sounds: ['c', 'u', 'p'], pictures: [{emoji: '☕', label: 'cup', correct: true}, {emoji: '🥛', label: 'milk'}, {emoji: '🍵', label: 'tea'}, {emoji: '🧃', label: 'juice'}]},
      { word: 'hat', sounds: ['h', 'a', 't'], pictures: [{emoji: '🎩', label: 'hat', correct: true}, {emoji: '👕', label: 'shirt'}, {emoji: '👖', label: 'pants'}, {emoji: '👟', label: 'shoe'}]},
      { word: 'pig', sounds: ['p', 'i', 'g'], pictures: [{emoji: '🐷', label: 'pig', correct: true}, {emoji: '🐮', label: 'cow'}, {emoji: '🐑', label: 'sheep'}, {emoji: '🐴', label: 'horse'}]},
      { word: 'bed', sounds: ['b', 'e', 'd'], pictures: [{emoji: '🛏️', label: 'bed', correct: true}, {emoji: '🪑', label: 'chair'}, {emoji: '🛋️', label: 'sofa'}, {emoji: '🚪', label: 'door'}]},
      { word: 'fox', sounds: ['f', 'o', 'x'], pictures: [{emoji: '🦊', label: 'fox', correct: true}, {emoji: '🐺', label: 'wolf'}, {emoji: '🐕', label: 'dog'}, {emoji: '🐱', label: 'cat'}]},
    ],
    ccvc: [
      { word: 'stop', sounds: ['s', 't', 'o', 'p'], pictures: [{emoji: '🛑', label: 'stop', correct: true}, {emoji: '🚦', label: 'light'}, {emoji: '⚠️', label: 'warning'}, {emoji: '🚸', label: 'crossing'}]},
      { word: 'frog', sounds: ['f', 'r', 'o', 'g'], pictures: [{emoji: '🐸', label: 'frog', correct: true}, {emoji: '🐊', label: 'crocodile'}, {emoji: '🦎', label: 'lizard'}, {emoji: '🐢', label: 'turtle'}]},
      { word: 'flag', sounds: ['f', 'l', 'a', 'g'], pictures: [{emoji: '🚩', label: 'flag', correct: true}, {emoji: '🏁', label: 'racing flag'}, {emoji: '🎌', label: 'crossed flags'}, {emoji: '🏴', label: 'black flag'}]},
      { word: 'crab', sounds: ['c', 'r', 'a', 'b'], pictures: [{emoji: '🦀', label: 'crab', correct: true}, {emoji: '🦞', label: 'lobster'}, {emoji: '🦐', label: 'shrimp'}, {emoji: '🐙', label: 'octopus'}]},
      { word: 'drum', sounds: ['d', 'r', 'u', 'm'], pictures: [{emoji: '🥁', label: 'drum', correct: true}, {emoji: '🎸', label: 'guitar'}, {emoji: '🎹', label: 'piano'}, {emoji: '🎺', label: 'trumpet'}]},
      { word: 'slip', sounds: ['s', 'l', 'i', 'p'], pictures: [{emoji: '🧊', label: 'slip', correct: true}, {emoji: '👟', label: 'shoe'}, {emoji: '🚶', label: 'walk'}, {emoji: '🏃', label: 'run'}]},
      { word: 'snap', sounds: ['s', 'n', 'a', 'p'], pictures: [{emoji: '💥', label: 'snap', correct: true}, {emoji: '✂️', label: 'scissors'}, {emoji: '🔊', label: 'sound'}, {emoji: '👏', label: 'clap'}]},
      { word: 'trip', sounds: ['t', 'r', 'i', 'p'], pictures: [{emoji: '✈️', label: 'trip', correct: true}, {emoji: '🚗', label: 'car'}, {emoji: '🚌', label: 'bus'}, {emoji: '🚂', label: 'train'}]},
      { word: 'glad', sounds: ['g', 'l', 'a', 'd'], pictures: [{emoji: '😊', label: 'glad', correct: true}, {emoji: '😢', label: 'sad'}, {emoji: '😠', label: 'angry'}, {emoji: '😴', label: 'sleepy'}]},
      { word: 'swim', sounds: ['s', 'w', 'i', 'm'], pictures: [{emoji: '🏊', label: 'swim', correct: true}, {emoji: '🏃', label: 'run'}, {emoji: '🚴', label: 'bike'}, {emoji: '⛷️', label: 'ski'}]},
    ],
    cvce: [
      { word: 'cake', sounds: ['c', 'a', 'k', 'e'], pictures: [{emoji: '🎂', label: 'cake', correct: true}, {emoji: '🍪', label: 'cookie'}, {emoji: '🧁', label: 'cupcake'}, {emoji: '🍩', label: 'donut'}]},
      { word: 'bike', sounds: ['b', 'i', 'k', 'e'], pictures: [{emoji: '🚲', label: 'bike', correct: true}, {emoji: '🛴', label: 'scooter'}, {emoji: '🏍️', label: 'motorcycle'}, {emoji: '🚗', label: 'car'}]},
      { word: 'kite', sounds: ['k', 'i', 't', 'e'], pictures: [{emoji: '🪁', label: 'kite', correct: true}, {emoji: '🎈', label: 'balloon'}, {emoji: '✈️', label: 'plane'}, {emoji: '🚁', label: 'helicopter'}]},
      { word: 'bone', sounds: ['b', 'o', 'n', 'e'], pictures: [{emoji: '🦴', label: 'bone', correct: true}, {emoji: '🥩', label: 'meat'}, {emoji: '🍖', label: 'meat on bone'}, {emoji: '🐕', label: 'dog'}]},
      { word: 'cube', sounds: ['c', 'u', 'b', 'e'], pictures: [{emoji: '🧊', label: 'cube', correct: true}, {emoji: '📦', label: 'box'}, {emoji: '⬛', label: 'square'}, {emoji: '🎲', label: 'dice'}]},
      { word: 'nose', sounds: ['n', 'o', 's', 'e'], pictures: [{emoji: '👃', label: 'nose', correct: true}, {emoji: '👂', label: 'ear'}, {emoji: '👁️', label: 'eye'}, {emoji: '👄', label: 'mouth'}]},
      { word: 'rope', sounds: ['r', 'o', 'p', 'e'], pictures: [{emoji: '🪢', label: 'rope', correct: true}, {emoji: '🧵', label: 'thread'}, {emoji: '🧶', label: 'yarn'}, {emoji: '⛓️', label: 'chain'}]},
      { word: 'cute', sounds: ['c', 'u', 't', 'e'], pictures: [{emoji: '🥰', label: 'cute', correct: true}, {emoji: '😊', label: 'happy'}, {emoji: '😍', label: 'love'}, {emoji: '🤗', label: 'hug'}]},
      { word: 'pipe', sounds: ['p', 'i', 'p', 'e'], pictures: [{emoji: '🚰', label: 'pipe', correct: true}, {emoji: '🚿', label: 'shower'}, {emoji: '💧', label: 'water'}, {emoji: '🏗️', label: 'construction'}]},
      { word: 'mane', sounds: ['m', 'a', 'n', 'e'], pictures: [{emoji: '🦁', label: 'mane', correct: true}, {emoji: '🐴', label: 'horse'}, {emoji: '🐯', label: 'tiger'}, {emoji: '🐻', label: 'bear'}]},
    ]
  };

  // DOM Elements
  const letterSlotsEl = document.getElementById('letterSlots');
  const blenderEl = document.getElementById('blender');
  const blendedWordEl = document.getElementById('blendedWord');
  const blendBtn = document.getElementById('blendBtn');
  const hearSoundsBtn = document.getElementById('hearSoundsBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pictureChoicesEl = document.getElementById('pictureChoices');
  const feedbackEl = document.getElementById('feedback');
  const scoreEl = document.getElementById('score');
  const streakEl = document.getElementById('streak');
  const currentEl = document.getElementById('current');
  const totalEl = document.getElementById('total');
  const progressEl = document.getElementById('progress');

  // Speech Synthesis
  const synth = window.speechSynthesis;

  // Level Selection
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gameState.level = btn.dataset.level;
      resetGame();
    });
  });

  // Initialize Game
  function resetGame() {
    gameState.currentQuestionIndex = 0;
    gameState.score = 0;
    gameState.streak = 0;
    updateScore();
    loadNextWord();
  }

  function loadNextWord() {
    if (gameState.currentQuestionIndex >= gameState.total) {
      endGame();
      return;
    }

    gameState.phase = 'listening';
    const words = wordBanks[gameState.level];
    gameState.currentWord = words[gameState.currentQuestionIndex];

    currentEl.textContent = gameState.currentQuestionIndex + 1;
    progressEl.style.width = ((gameState.currentQuestionIndex / gameState.total) * 100) + '%';

    // Reset UI
    letterSlotsEl.innerHTML = '';
    blendedWordEl.textContent = '';
    blendedWordEl.classList.remove('show');
    pictureChoicesEl.innerHTML = '';
    pictureChoicesEl.classList.remove('show');
    blendBtn.disabled = true;
    blendBtn.style.display = 'inline-block';
    hearSoundsBtn.style.display = 'none';
    nextBtn.style.display = 'none';
    blenderEl.classList.remove('blending');

    // Create letter slots
    gameState.currentWord.sounds.forEach(() => {
      const slot = document.createElement('div');
      slot.className = 'letter-slot';
      slot.textContent = '?';
      letterSlotsEl.appendChild(slot);
    });

    // Start playing sounds
    setTimeout(() => playSounds(), 500);
  }

  function playSounds() {
    const sounds = gameState.currentWord.sounds;
    let index = 0;

    function playNext() {
      if (index >= sounds.length) {
        blendBtn.disabled = false;
        hearSoundsBtn.style.display = 'inline-block';
        return;
      }

      const sound = sounds[index];
      const slot = letterSlotsEl.children[index];

      // Visual
      slot.textContent = sound;
      slot.classList.add('filled');

      // Audio
      speak(getPhonemeSound(sound), () => {
        index++;
        setTimeout(playNext, 800);
      });
    }

    playNext();
  }

  function getPhonemeSound(letter) {
    // Map letters to phoneme sounds
    const phoneticMap = {
      'a': 'ah', 'e': 'eh', 'i': 'ih', 'o': 'oh', 'u': 'uh',
      'c': 'kuh', 'k': 'kuh', 'g': 'guh', 'p': 'puh', 'b': 'buh',
      't': 'tuh', 'd': 'duh', 'n': 'nuh', 'm': 'muh',
      's': 'sss', 'f': 'fff', 'l': 'lll', 'r': 'rrr',
      'h': 'hhh', 'w': 'www', 'y': 'yyy', 'z': 'zzz',
      'x': 'ks', 'qu': 'kw',
    };
    return phoneticMap[letter] || letter;
  }

  function speak(text, callback) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.8;
    utterance.pitch = 1.2;
    utterance.onend = callback;
    synth.speak(utterance);
  }

  // Blend Button
  blendBtn.addEventListener('click', () => {
    gameState.phase = 'blended';
    blenderEl.classList.add('blending');
    
    setTimeout(() => {
      blenderEl.classList.remove('blending');
      blendedWordEl.textContent = gameState.currentWord.word;
      blendedWordEl.classList.add('show');
      
      speak(gameState.currentWord.word, () => {
        showPictureChoices();
      });
    }, 1000);

    blendBtn.style.display = 'none';
    hearSoundsBtn.style.display = 'none';
  });

  // Hear Sounds Again
  hearSoundsBtn.addEventListener('click', () => {
    hearSoundsBtn.disabled = true;
    blendBtn.disabled = true;
    
    const sounds = gameState.currentWord.sounds;
    let index = 0;

    function playNext() {
      if (index >= sounds.length) {
        hearSoundsBtn.disabled = false;
        blendBtn.disabled = false;
        return;
      }

      speak(getPhonemeSound(sounds[index]), () => {
        index++;
        setTimeout(playNext, 800);
      });
    }

    playNext();
  });

  function showPictureChoices() {
    gameState.phase = 'choosing';
    pictureChoicesEl.classList.add('show');

    const shuffled = [...gameState.currentWord.pictures].sort(() => Math.random() - 0.5);

    shuffled.forEach(pic => {
      const card = document.createElement('div');
      card.className = 'picture-card';
      card.innerHTML = `
        <div class="picture-emoji">${pic.emoji}</div>
        <div class="picture-label">${pic.label}</div>
      `;
      card.onclick = () => checkAnswer(card, pic.correct);
      pictureChoicesEl.appendChild(card);
    });
  }

  function checkAnswer(card, isCorrect) {
    // Disable all cards
    document.querySelectorAll('.picture-card').forEach(c => c.style.pointerEvents = 'none');

    if (isCorrect) {
      card.classList.add('correct');
      feedbackEl.textContent = '🎉';
      feedbackEl.classList.add('show');
      launchConfetti();
      
      gameState.score += 10;
      gameState.streak += 1;
      
      speak('Correct! Great job!');
    } else {
      card.classList.add('wrong');
      feedbackEl.textContent = '🤔';
      feedbackEl.classList.add('show');
      
      gameState.streak = 0;
      
      // Show correct answer
      document.querySelectorAll('.picture-card').forEach(c => {
        const label = c.querySelector('.picture-label').textContent;
        if (label === gameState.currentWord.word) {
          setTimeout(() => c.classList.add('correct'), 500);
        }
      });
      
      speak('Try again! The correct answer is ' + gameState.currentWord.word);
    }

    updateScore();
    
    setTimeout(() => {
      feedbackEl.classList.remove('show');
    }, 1000);

    nextBtn.style.display = 'inline-block';
  }

  // Next Button
  nextBtn.addEventListener('click', () => {
    gameState.currentQuestionIndex++;
    loadNextWord();
  });

  function updateScore() {
    scoreEl.textContent = gameState.score;
    streakEl.textContent = gameState.streak;
  }

  function launchConfetti() {
    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
    for (let i = 0; i < 30; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + 'vw';
      confetti.style.top = '-10px';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2000);
    }
  }

  function endGame() {
    const percentage = Math.round((gameState.score / (gameState.total * 10)) * 100);
    let message = '';
    let emoji = '';

    if (percentage >= 90) {
      message = 'Amazing! You are a Blending Master!';
      emoji = '🏆';
    } else if (percentage >= 70) {
      message = 'Great job! Keep practicing!';
      emoji = '⭐';
    } else {
      message = 'Good effort! Try again!';
      emoji = '💪';
    }

    letterSlotsEl.innerHTML = `
      <div style="text-align: center; width: 100%;">
        <div style="font-size: 5rem; margin-bottom: 20px;">${emoji}</div>
        <h2 style="color: #667eea; margin-bottom: 15px;">${message}</h2>
        <p style="font-size: 1.5rem; margin-bottom: 15px;">Final Score: ${gameState.score}</p>
        <p style="font-size: 1.3rem; margin-bottom: 25px;">Accuracy: ${percentage}%</p>
        <button class="btn btn-next" onclick="resetGame()">Play Again 🔄</button>
      </div>
    `;
    
    blenderEl.style.display = 'none';
    pictureChoicesEl.style.display = 'none';
    document.querySelector('.action-buttons').style.display = 'none';
    
    launchConfetti();
    speak(message);
  }

  // Start game
  resetGame();
</script>
</body>
</html>
