        * {
            font-family: 'Nunito', sans-serif;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            }

            50% {
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100%) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100%) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes orbit {
            0% {
                transform: rotate(0deg) translateX(30px) rotate(0deg);
            }

            100% {
                transform: rotate(360deg) translateX(30px) rotate(-360deg);
            }
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes slide-up {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .shake-animation {
            animation: shake 0.5s ease-in-out;
        }

        .bounce-in {
            animation: bounce-in 0.5s ease-out;
        }

        .slide-up {
            animation: slide-up 0.5s ease-out;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confetti-fall 3s linear forwards;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        .planet {
            position: absolute;
            animation: orbit 20s linear infinite;
        }

        .game-button {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .game-button:hover {
            transform: scale(1.05);
        }

        .game-button:active {
            transform: scale(0.95);
        }

        .correct-glow {
            box-shadow: 0 0 30px #22c55e, 0 0 60px #22c55e;
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
        }

        .wrong-shake {

        }

        .nav-button {
            transition: all 0.3s ease;
        }

        .nav-button.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>

        // Sound effects using Web Audio API
        const audioContext = new(window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'correct') {
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.4);
            } else if (type === 'wrong') {
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else if (type === 'click') {
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            }
        }

            const container = document.getElementById('confetti-container');
            const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

            }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

          <div class="relative ${cardClasses} backdrop-blur-md rounded-3xl p-8 md:p-12 text-center shadow-2xl bounce-in">
            ${showSpaceTheme ? `
              <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-gradient-to-r from-blue-500 to-purple-500 px-6 py-2 rounded-full text-white font-bold text-lg">
                ${stageLabel}
              </div>
              <div class="mt-4"></div>
            ` : `
              <div class="mb-4 text-lg font-bold text-yellow-300">${stageLabel}</div>
            `}
            
            <!-- Question Emoji -->
            <div class="text-8xl md:text-9xl mb-8">${question.emoji}</div>
            
            <!-- Question Text -->
            <div class="text-2xl md:text-4xl font-bold text-white mb-8 leading-relaxed" id="question-text">
              ${formatQuestion(question.sentence)}
            </div>
            
            <!-- Teacher Mode Indicator -->
            ${teacherMode ? `
              <div class="mb-6 p-3 bg-yellow-400/20 border-2 border-yellow-300 rounded-xl text-yellow-300 font-semibold text-sm md:text-base">
                🎓 Teacher Mode: Ask the student their answer!
              </div>
            ` : ''}
            
            <!-- Answer Buttons -->
            <div class="flex justify-center gap-4 md:gap-6 flex-wrap mb-6" id="answer-buttons">
              <button onclick="checkAnswer('A')" class="game-button w-24 h-24 md:w-32 md:h-32 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-2xl text-2xl md:text-3xl font-extrabold text-purple-900 shadow-lg hover:shadow-xl transition-shadow">
                A
              </button>
              <button onclick="checkAnswer('AN')" class="game-button w-24 h-24 md:w-32 md:h-32 bg-gradient-to-br from-green-400 to-teal-500 rounded-2xl text-2xl md:text-3xl font-extrabold text-white shadow-lg hover:shadow-xl transition-shadow">
                AN
              </button>
              <button onclick="checkAnswer('THE')" class="game-button w-24 h-24 md:w-32 md:h-32 bg-gradient-to-br from-blue-400 to-purple-500 rounded-2xl text-2xl md:text-3xl font-extrabold text-white shadow-lg hover:shadow-xl transition-shadow">
                THE
              </button>
            </div>
            
            <!-- Feedback Area -->
            <div id="feedback" class="min-h-12 text-2xl md:text-3xl font-bold hidden"></div>
            
            <!-- Encouragement Message -->
            <div class="mt-4 text-sm md:text-lg text-white/70" id="encouragement">${config.encouragement_message || defaultConfig.encouragement_message}</div>
          </div>
        </div>
      `;
        }

        // Stage 2: Practice
        function renderPracticeStage() {
            renderQuestionCard(false);
        }

        // Stage 3: Space Challenge
        function renderSpaceStage() {
            renderQuestionCard(true);
        }

        function generateStars() {
            let stars = '';
            for (let i = 0; i < 30; i++) {
                const size = Math.random() * 3 + 1;
                stars += `<div class="star" style="
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          width: ${size}px;
          height: ${size}px;
          animation-delay: ${Math.random() * 2}s;
        "></div>`;
            }
            return stars;
        }

        function formatQuestion(sentence) {
            return sentence.replace('___',
                '<span class="inline-block w-20 md:w-32 border-b-4 border-yellow-400 mx-2"></span>');
        }

        function updateProgress() {
            document.getElementById('score').textContent = score;
            document.getElementById('question-num').textContent = currentQuestionIndex + 1;
            const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        function checkAnswer(answer) {
            if (answerRevealed) return;

            const question = currentQuestions[currentQuestionIndex];
            const correct = answer === question.answer;
            const buttons = document.querySelectorAll('#answer-buttons button');
            const feedback = document.getElementById('feedback');

            buttons.forEach(btn => {
                if (btn.textContent.trim() === question.answer) {
                    btn.classList.add('correct-glow');
                } else if (btn.textContent.trim() === answer && !correct) {
                    btn.classList.add('wrong-shake');
                }
                btn.disabled = true;
            });

            feedback.classList.remove('hidden');

            if (correct) {
                score += 10;
                playSound('correct');
                createConfetti();
                feedback.innerHTML = '<span class="text-green-300">✨ Great job! ✨</span>';
            } else {
                playSound('wrong');
                feedback.innerHTML = `<span class="text-red-300">The answer is: ${question.answer}</span>`;
            }

            answerRevealed = true;

            // Auto advance after delay
            setTimeout(() => {
                nextQuestion();
            }, 2500);
        }

        function nextQuestion() {
            answerRevealed = false;
            currentQuestionIndex++;

            if (currentQuestionIndex >= currentQuestions.length) {
                showResults();
            } else {
                if (currentStage === 2) {
                    renderPracticeStage();
                } else {
                    renderSpaceStage();
                }
            }
        }

        function showResults() {
            const main = document.getElementById('main-content');
            const percentage = (score / (currentQuestions.length * 10)) * 100;

            let message = '';
            let emoji = '';

            if (percentage >= 80) {
                message = "Amazing! You're a superstar! 🌟";
                emoji = "🏆";
            } else if (percentage >= 60) {
                message = "Great work! Keep practicing!";
                emoji = "⭐";
            } else {
                message = "Good try! Let's learn more!";
                emoji = "💪";
            }

            createConfetti();
            playSound('correct');

            main.innerHTML = `
        <div class="max-w-2xl mx-auto text-center">
          <div class="bg-white/20 backdrop-blur-md rounded-3xl p-12 bounce-in">
            <div class="text-9xl mb-6">${emoji}</div>
            <h2 class="text-4xl font-extrabold text-white mb-4">Stage Complete!</h2>
            <div class="text-6xl font-extrabold text-yellow-300 mb-4">${score} Points</div>
            <p class="text-2xl text-white mb-8">${message}</p>
            <div class="flex justify-center gap-4 flex-wrap">
              <button onclick="resetStage()" class="game-button px-8 py-4 bg-gradient-to-r from-green-400 to-teal-500 rounded-full text-xl font-bold text-white shadow-xl">
                🔄 Play Again
              </button>
              <button onclick="goToStage(1)" class="game-button px-8 py-4 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full text-xl font-bold text-purple-900 shadow-xl">
                📚 Learn More
              </button>
            </div>
          </div>
        </div>
      `;
        }

        // Teacher Controls
        function revealAnswer() {
            if (answerRevealed || currentStage === 1) return;

            const question = currentQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('#answer-buttons button');

            buttons.forEach(btn => {
                if (btn.textContent.trim() === question.answer) {
                    btn.classList.add('correct-glow');
                }
            });

            const feedback = document.getElementById('feedback');
            if (feedback) {
                feedback.classList.remove('hidden');
                feedback.innerHTML = `<span class="text-yellow-300">Answer: ${question.answer}</span>`;
            }

            answerRevealed = true;
        }

        function skipQuestion() {
            if (currentStage === 1) return;
            answerRevealed = false;
            nextQuestion();
        }

        function resetGame() {
            score = 0;
            currentQuestionIndex = 0;
            answerRevealed = false;
            goToStage(currentStage);
        }

        function resetStage() {
            score = 0;
            currentQuestionIndex = 0;
            answerRevealed = false;
            if (currentStage === 2) {
                currentQuestions = shuffleArray([...allQuestions]).slice(0, 10);
                renderPracticeStage();
            } else if (currentStage === 3) {
                currentQuestions = shuffleArray([...allQuestions]).slice(0, 10);
                renderSpaceStage();
            }
        }

        function toggleTeacherMode() {
            teacherMode = !teacherMode;
            const btn = document.getElementById('teacher-mode-btn');
            btn.textContent = teacherMode ? '🎓 Mode: ON' : '🎓 Mode: OFF';
            btn.classList.toggle('bg-green-600', teacherMode);
            btn.classList.toggle('bg-gray-600', !teacherMode);

            // Re-render current stage to update teacher mode indicator
            if (currentStage === 2) {
                renderPracticeStage();
            } else if (currentStage === 3) {
                renderSpaceStage();
            }
        }

        // Element SDK Integration
        async function onConfigChange(newConfig) {
            config = {
                ...defaultConfig,
                ...newConfig
            };

            // Update title if on learn stage
            const titleEl = document.getElementById('main-title');
            if (titleEl) {
                titleEl.textContent = config.game_title || defaultConfig.game_title;
            }

            // Update encouragement message if visible
            const encouragementEl = document.getElementById('encouragement');
            if (encouragementEl) {
                encouragementEl.textContent = config.encouragement_message || defaultConfig.encouragement_message;
            }
        }

        function mapToCapabilities(config) {
            return {
                recolorables: [{
                        get: () => config.primary_color || defaultConfig.primary_color,
                        set: (value) => {
                            config.primary_color = value;
                            window.elementSdk.setConfig({
                                primary_color: value
                            });
                        }
                    },
                    {
                        get: () => config.secondary_color || defaultConfig.secondary_color,
                        set: (value) => {
                            config.secondary_color = value;
                            window.elementSdk.setConfig({
                                secondary_color: value
                            });
                        }
                    },
                    {
                        get: () => config.accent_color || defaultConfig.accent_color,
                        set: (value) => {
                            config.accent_color = value;
                            window.elementSdk.setConfig({
                                accent_color: value
                            });
                        }
                    }
                ],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            };
        }

        function mapToEditPanelValues(config) {
            return new Map([
                ["game_title", config.game_title || defaultConfig.game_title],
                ["encouragement_message", config.encouragement_message || defaultConfig.encouragement_message]
            ]);
        }

        // Initialize
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities,
                mapToEditPanelValues
            });
        }

        // Start the game
        goToStage(1);
    </script>
</body>

</html>
