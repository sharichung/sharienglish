<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Survival</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --line: #dfe7f3;
      --text: #1f2a3d;
      --muted: #63708a;
      --primary: #4c7df0;
      --primary-dark: #315fcb;
      --accent: #7bd3a8;
      --danger: #e76d6d;
      --warning: #f2b94b;
      --shadow: 0 14px 40px rgba(50, 80, 140, 0.12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #edf4ff 0%, #f8fbff 100%);
      color: var(--text);
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
    }

    .title-wrap h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      min-width: min(100%, 520px);
      justify-content: flex-end;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.92rem;
      background: #eef4ff;
      color: var(--primary-dark);
      border: 1px solid #d7e5ff;
    }

    .badge.streak {
      background: #eefbf4;
      color: #2f8f5d;
      border-color: #d5f1e2;
    }

    .theme-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: #f8faff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 700;
    }

    .progress-wrap {
      width: min(240px, 100%);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e5edf9;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--primary), #7aa3ff);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .workspace {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .sidebar h2,
    .content h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .sidebar p,
    .muted {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .theme-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .theme-btn,
    .mode-btn,
    .difficulty-btn,
    .action-btn,
    .option-btn,
    .mini-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .theme-btn {
      text-align: left;
      padding: 11px 12px;
      font-weight: 600;
    }

    .theme-btn:hover,
    .mode-btn:hover,
    .difficulty-btn:hover,
    .action-btn:hover,
    .option-btn:hover,
    .mini-btn:hover {
      transform: translateY(-1px);
      border-color: #bfd0f5;
      box-shadow: 0 8px 18px rgba(76, 125, 240, 0.08);
    }

    .theme-btn.active,
    .mode-btn.active,
    .difficulty-btn.active {
      background: linear-gradient(135deg, var(--primary), #6a94ff);
      color: white;
      border-color: transparent;
    }

    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tabs,
    .difficulty-row,
    .card-actions,
    .inline-options,
    .flow-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mode-btn,
    .difficulty-btn,
    .mini-btn {
      padding: 10px 14px;
      font-weight: 700;
    }

    .activity-card {
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      min-height: 520px;
    }

    .activity-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .eyebrow {
      color: var(--primary-dark);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .activity-title {
      margin: 0;
      font-size: 1.35rem;
    }

    .step-note {
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .card {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }

    .flashcard {
      min-height: 210px;
      display: grid;
      place-items: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .flash-word {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .flash-pos {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.8rem;
      margin-bottom: 10px;
    }

    .flash-hint {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .forms {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eaf2ff;
      color: var(--primary-dark);
      font-size: 0.83rem;
      font-weight: 700;
    }

    .chip.bookmark {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding-right: 6px;
    }

    .chip-remove {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-weight: 800;
      line-height: 1;
      padding: 0 2px;
      border-radius: 999px;
    }

    .chip-remove:hover {
      background: rgba(49, 95, 203, 0.12);
    }

    .action-btn {
      padding: 11px 15px;
      font-weight: 700;
    }

    .action-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .action-btn.soft {
      background: #eef6ff;
      color: var(--primary-dark);
    }

    .action-btn.success {
      background: #eaf9f1;
      color: #247a4c;
    }

    .prompt {
      font-size: 1.08rem;
      line-height: 1.7;
      margin: 0 0 16px;
    }

    .option-grid {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      padding: 13px 14px;
      text-align: left;
      font-weight: 600;
    }

    .option-btn.correct {
      background: #e9f9f0;
      border-color: #a7e1bf;
      color: #1f7449;
    }

    .option-btn.incorrect {
      background: #fff0f0;
      border-color: #f3b0b0;
      color: #b34d4d;
    }

    .answer-box {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0;
      align-items: center;
    }

    .answer-box input,
    .answer-box textarea,
    .answer-box select {
      flex: 1;
      min-width: 180px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      background: white;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .feedback-note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f7fbff;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .feedback-note.good {
      background: #eaf9f1;
      border-color: #b6e8ca;
      color: #216e45;
    }

    .feedback-note.bad {
      background: #fff3f3;
      border-color: #f1c2c2;
      color: #a24f4f;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-card {
      padding: 12px;
      border-radius: 14px;
      background: #f8fbff;
      border: 1px solid var(--line);
    }

    .stat-card strong {
      display: block;
      font-size: 1.1rem;
      margin-top: 4px;
    }

    .list-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .review-box {
      background: #fffbef;
      border: 1px solid #f7e3a8;
      border-radius: 14px;
      padding: 12px;
      color: #81631e;
    }

    .flow-row {
      margin-top: 10px;
    }

    .flow-chip {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      border: 1px solid var(--line);
      background: white;
    }

    .flow-chip.active {
      background: #eef4ff;
      border-color: #c8d9ff;
      color: var(--primary-dark);
    }

    .timer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 14px;
    }

    .timer small {
      color: var(--muted);
      min-width: 48px;
      text-align: right;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: 280px;
      background: #1f2a3d;
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-wrap">
        <h1>Vocabulary Survival</h1>
      </div>
      <div class="header-meta">
        <div class="theme-pill" id="currentThemeLabel">Theme: Feelings</div>
      </div>
    </header>

    <div class="workspace">
      <aside class="panel sidebar">
        <h2>Theme Navigation</h2>
        <p>Move through the dashboard one theme at a time.</p>
        <div class="theme-list" id="themeList"></div>

        <h2 style="margin-top:16px;">Bookmarks</h2>
        <p>Saved words for your personalized quiz.</p>
        <div class="list-wrap" id="bookmarkedWords">
          <span class="empty">No bookmarked words yet</span>
        </div>

        <h2 style="margin-top:16px;">Progress Tools</h2>
        <div class="card-actions" style="margin-top:8px;">
          <button class="mini-btn" id="clearBookmarksBtn">Clear Bookmarks</button>
          <button class="mini-btn" id="resetProgressBtn">Reset Progress</button>
        </div>
      </aside>

      <main class="panel content">
        <div class="tabs" id="modeTabs"></div>
        <div class="difficulty-row" id="difficultyRow"></div>
        <div class="activity-card" id="activityCard"></div>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="vocabulary_B2_themes.bundle.js"></script>
  <script>
    function resolveAssetUrl(fileName) {
      return new URL(fileName, window.location.href).toString();
    }

    function getBundledThemesData() {
      return window.__VOCAB_B2_THEMES_DATA__ || null;
    }

    function showLoadError(message) {
      const activityCard = document.getElementById("activityCard");
      if (!activityCard) return;
      activityCard.innerHTML = `
        <div class="activity-head">
          <div>
            <div class="eyebrow">Data Load Error</div>
            <h2 class="activity-title">Vocabulary data is unavailable</h2>
          </div>
        </div>
        <div class="card">
          <p class="prompt">${message}</p>
          <p class="muted">Please make sure vocabulary_B2_themes.json is available in this folder and reachable.</p>
        </div>
      `;
    }

    let REQUIRED_B2_WORDS = [];
    let meaningOverrides = {};
    let exampleOverrides = {};
    let curatedWordUpgrades = {};

    async function loadWordBankData() {
      if (REQUIRED_B2_WORDS.length) {
        return;
      }

      console.warn("Word bank not initialized from themes JSON.");
    }

    function guessPartOfSpeech(word) {

      const lower = (word || "").toLowerCase();
      if (lower.includes(" ")) return "phrase";
      if (lower.includes("-")) {
        if (/(ed|ing)$/.test(lower)) return "adjective";
        return "phrase";
      }
      if (/(ly)$/.test(lower)) return "adverb";
      if (/(ed|ing)$/.test(lower)) return "adjective";
      if (/(tion|sion|ment|ness|ity|ship|ism|ist|age|ance|ence|dom|hood)$/.test(lower)) return "noun";
      if (/(ate|ify|ise|ize|en)$/.test(lower)) return "verb";
      if (/(ous|ive|able|ible|ful|less|ical|ic|al|ary|ory|ent|ant)$/.test(lower)) return "adjective";

      // Word-family hints: if derivatives exist, infer likely base POS.
      const family = REQUIRED_B2_WORDS.includes(lower);
      if (family) {
        const hasVerbFamily = REQUIRED_B2_WORDS.some(item =>
          item.startsWith(`${lower}`) && /(ation|ition|ment|ance|ence|al|ive|or|er)$/.test(item.slice(lower.length))
        );
        if (hasVerbFamily) return "verb";

        const hasAdjFamily = REQUIRED_B2_WORDS.includes(`${lower}ly`) || REQUIRED_B2_WORDS.includes(`${lower}ness`);
        if (hasAdjFamily) return "adjective";
      }

      if (/(er|or)$/.test(lower)) return "noun";
      return "noun";
    }

    function safeTerm(word) {
      return `${word || "term"}`.trim();
    }

    function articleFor(term) {
      return /^[aeiou]/i.test(term) ? "an" : "a";
    }

    function toPastTense(verb) {
      if (/e$/i.test(verb)) return `${verb}d`;
      if (/[^aeiou]y$/i.test(verb)) return `${verb.slice(0, -1)}ied`;
      return `${verb}ed`;
    }

    function toIngForm(verb) {
      if (/ie$/i.test(verb)) return `${verb.slice(0, -2)}ying`;
      if (/e$/i.test(verb) && !/ee$/i.test(verb)) return `${verb.slice(0, -1)}ing`;
      return `${verb}ing`;
    }

    function toPlural(noun) {
      if (/(s|x|z|ch|sh)$/i.test(noun)) return `${noun}es`;
      if (/[^aeiou]y$/i.test(noun)) return `${noun.slice(0, -1)}ies`;
      return `${noun}s`;
    }

    const ALLOWED_FORM_TYPES = ["noun", "verb", "adjective", "adverb", "phrasal verb"];

    function normalizeFormType(type) {
      const lower = `${type || ""}`.toLowerCase().trim();
      if (!lower) return "";
      if (lower === "phrase" || lower === "phrasal" || lower === "phrasal_verb" || lower === "phrasal-verb") {
        return "phrasal verb";
      }
      if (ALLOWED_FORM_TYPES.includes(lower)) return lower;
      return "";
    }

    function inferFormType(form, fallbackPos = "noun") {
      const text = `${form || ""}`.toLowerCase().trim();
      const normalizedPos = normalizeFormType(fallbackPos) || "noun";

      if (!text) return normalizedPos;
      if (text.includes(" ") && !text.startsWith("more ") && !text.startsWith("most ")) return "phrasal verb";
      if (/ly$/.test(text)) return "adverb";
      if (/ous$|ive$|able$|ible$|ful$|less$|ical$|ic$|al$|ary$|ory$|ent$|ant$/.test(text)) return "adjective";
      if (/ing$|ed$|en$/.test(text)) return "verb";
      if (/tion$|sion$|ment$|ness$|ity$|ship$|ism$|ist$|age$|ance$|ence$|dom$|hood$/.test(text)) return "noun";
      if (/s$/.test(text) && normalizedPos === "noun") return "noun";

      return normalizedPos;
    }

    function toPastPhrasalVerb(phrase) {
      const parts = `${phrase || ""}`.trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "";
      if (parts.length === 1) return toPastTense(parts[0]);
      return `${toPastTense(parts[0])} ${parts.slice(1).join(" ")}`;
    }

    function toIngPhrasalVerb(phrase) {
      const parts = `${phrase || ""}`.trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "";
      if (parts.length === 1) return toIngForm(parts[0]);
      return `${toIngForm(parts[0])} ${parts.slice(1).join(" ")}`;
    }

    function stripCommonSuffixes(word) {
      const lower = `${word || ""}`.toLowerCase().trim();
      if (!lower) return [];

      const variants = new Set([lower]);
      const rules = [
        [/ization$/, ["ize"]],
        [/isation$/, ["ise"]],
        [/ational$/, ["ate"]],
        [/ation$/, ["ate", ""]],
        [/ition$/, ["ite", ""]],
        [/tion$/, ["te", ""]],
        [/sion$/, ["de", ""]],
        [/ment$/, ["", "e"]],
        [/ance$/, ["", "e"]],
        [/ence$/, ["", "e"]],
        [/ness$/, [""]],
        [/ity$/, ["", "e"]],
        [/ality$/, ["al"]],
        [/ship$/, [""]],
        [/ism$/, [""]],
        [/ist$/, [""]],
        [/al$/, [""]],
        [/ive$/, ["e", ""]],
        [/able$/, ["e", ""]],
        [/ible$/, ["e", ""]],
        [/ly$/, [""]],
        [/ing$/, ["", "e"]],
        [/ied$/, ["y"]],
        [/ed$/, ["", "e"]],
        [/ies$/, ["y"]],
        [/s$/, [""]]
      ];

      for (const [pattern, replacements] of rules) {
        if (!pattern.test(lower)) continue;
        replacements.forEach(repl => {
          const stem = lower.replace(pattern, repl).trim();
          if (stem.length >= 3) variants.add(stem);
        });
      }

      return Array.from(variants);
    }

    function getLexemeHead(word) {
      const lower = `${word || ""}`.toLowerCase().trim();
      if (!lower) return "";
      return lower.split(/\s+/)[0].replace(/[^a-z-]/g, "");
    }

    function areLikelyFamilyMembers(sourceWord, candidateWord) {
      const source = `${sourceWord || ""}`.toLowerCase().trim();
      const candidate = `${candidateWord || ""}`.toLowerCase().trim();
      if (!source || !candidate || source === candidate) return false;

      if (candidate.startsWith(`${source} `) || source.startsWith(`${candidate} `)) {
        return true;
      }

      const sourceHead = getLexemeHead(source);
      const candidateHead = getLexemeHead(candidate);
      if (!sourceHead || !candidateHead) return false;

      if (sourceHead === candidateHead) return true;
      if (sourceHead.length >= 6 && candidateHead.startsWith(sourceHead)) return true;
      if (candidateHead.length >= 6 && sourceHead.startsWith(candidateHead)) return true;

      const sourceStems = stripCommonSuffixes(sourceHead);
      const candidateStems = new Set(stripCommonSuffixes(candidateHead));
      return sourceStems.some(stem => stem.length >= 4 && candidateStems.has(stem));
    }

    function getFamilyFormEntries(word, pos) {
      const normalizedPos = normalizeFormType(pos) || inferFormType(word, "noun");
      if (!Array.isArray(REQUIRED_B2_WORDS) || !REQUIRED_B2_WORDS.length) return [];

      const entries = [];
      REQUIRED_B2_WORDS.forEach(candidate => {
        const form = `${candidate || ""}`.trim();
        if (!form) return;
        if (!areLikelyFamilyMembers(word, form)) return;

        const candidatePos = guessPartOfSpeech(form);
        const type = normalizeFormType(candidatePos) || inferFormType(form, normalizedPos);
        if (!ALLOWED_FORM_TYPES.includes(type)) return;

        entries.push({ form, type });
      });

      return entries;
    }

    function getDerivedFormEntries(word, pos) {
      const term = `${word || ""}`.toLowerCase().trim();
      const normalizedPos = normalizeFormType(pos) || inferFormType(term, "noun");
      const entries = [];

      const add = (form, type) => {
        const clean = `${form || ""}`.trim();
        const normalizedType = normalizeFormType(type) || inferFormType(clean, normalizedPos);
        if (!clean) return;
        if (!/^[a-z]+(?:\s[a-z]+)*$/.test(clean)) return;
        if (!ALLOWED_FORM_TYPES.includes(normalizedType)) return;
        entries.push({ form: clean, type: normalizedType });
      };

      if (normalizedPos === "noun") {
        if (/ment$/.test(term)) {
          const stem = term.slice(0, -4);
          if (stem.length >= 4) {
            add(stem, "verb");
            if (!stem.endsWith("e")) add(`${stem}e`, "verb");
          }
        }
        if (/(ation|ition)$/.test(term)) {
          const stem = term.replace(/(ation|ition)$/, "");
          if (stem.length >= 4) {
            add(`${stem}e`, "verb");
            add(`${stem}ate`, "verb");
          }
        }
        if (/(tion|sion)$/.test(term) && !/(ation|ition)$/.test(term)) {
          const stem = term.replace(/(tion|sion)$/, "");
          if (stem.length >= 4) {
            if (!stem.endsWith("e")) add(`${stem}e`, "verb");
          }
        }
        if (/(ance|ence)$/.test(term)) {
          const stem = term.replace(/(ance|ence)$/, "");
          if (stem.length >= 4) {
            if (!stem.endsWith("e")) add(`${stem}e`, "verb");
            add(stem, "verb");
          }
        }
        if (/ness$/.test(term)) {
          const stem = term.replace(/ness$/, "");
          if (stem.length >= 4) {
            add(stem, "adjective");
          }
        }
        if (/ity$/.test(term)) {
          const stem = term.replace(/ity$/, "");
          if (stem.length >= 4 && stem.endsWith("iv")) {
            add(`${stem}e`, "adjective");
          }
        }
      }

      if (normalizedPos === "adverb" && /ly$/.test(term)) {
        const stem = term.replace(/ly$/, "");
        if (stem.length >= 4) {
          add(stem, "adjective");
        }
      }

      if (normalizedPos === "adjective") {
        if (/ing$/.test(term)) {
          const stem = term.replace(/ing$/, "");
          if (stem.length >= 4) {
            add(stem, "verb");
            add(`${stem}e`, "verb");
          }
        }
        if (/ed$/.test(term)) {
          const stem = term.replace(/ed$/, "");
          if (stem.length >= 4) {
            add(stem, "verb");
            add(`${stem}e`, "verb");
          }
        }
        if (/(ive|ous|al|ful|less|able|ible)$/.test(term)) {
          add(`${term}ly`, "adverb");
        }
      }

      return entries;
    }

    function dedupeAndEnsureFormEntries(entries, word, fallbackPos = "noun") {
      const normalizedPos = normalizeFormType(fallbackPos) || "noun";
      const term = safeTerm(word);
      const byForm = new Map();

      entries.forEach(item => {
        const form = `${item?.form || ""}`.trim();
        if (!form) return;
        if (/\(past\)|\(continuous\)|-related$/i.test(form)) return;
        const type = normalizeFormType(item?.type) || inferFormType(form, normalizedPos);
        if (!ALLOWED_FORM_TYPES.includes(type)) return;
        const key = form.toLowerCase();
        if (!byForm.has(key)) {
          byForm.set(key, { form, type });
        }
      });

      const baseType = inferFormType(term, normalizedPos);
      if (!byForm.has(term.toLowerCase())) {
        byForm.set(term.toLowerCase(), { form: term, type: baseType });
      }

      const list = Array.from(byForm.values());
      if (list.length < 2) {
        if (baseType === "verb") {
          list.push({ form: toPastTense(term), type: "verb" });
        } else if (baseType === "noun") {
          list.push({ form: toPlural(term), type: "noun" });
        } else if (baseType === "phrasal verb") {
          list.push({ form: toPastPhrasalVerb(term), type: "phrasal verb" });
        } else {
          list.push({ form: `more ${term}`, type: baseType });
        }
      }

      return Array.from(new Map(
        list
          .filter(item => item.form && item.type)
          .map(item => [item.form.toLowerCase(), item])
      ).values());
    }

    function generateLikelyFormEntries(word, pos) {
      const term = safeTerm(word);
      const normalizedPos = normalizeFormType(pos) || inferFormType(term, "noun");
      const familyEntries = getFamilyFormEntries(term, normalizedPos);
      const derivedEntries = getDerivedFormEntries(term, normalizedPos);

      if (normalizedPos === "verb") {
        return dedupeAndEnsureFormEntries([
          { form: term, type: "verb" },
          { form: toPastTense(term), type: "verb" },
          { form: toIngForm(term), type: "verb" },
          ...familyEntries,
          ...derivedEntries
        ], term, normalizedPos);
      }

      if (normalizedPos === "adjective") {
        return dedupeAndEnsureFormEntries([
          { form: term, type: "adjective" },
          { form: `more ${term}`, type: "adjective" },
          { form: `most ${term}`, type: "adjective" },
          ...familyEntries,
          ...derivedEntries
        ], term, normalizedPos);
      }

      if (normalizedPos === "adverb") {
        return dedupeAndEnsureFormEntries([
          { form: term, type: "adverb" },
          { form: `more ${term}`, type: "adverb" },
          { form: `most ${term}`, type: "adverb" },
          ...familyEntries,
          ...derivedEntries
        ], term, normalizedPos);
      }

      if (normalizedPos === "phrasal verb") {
        return dedupeAndEnsureFormEntries([
          { form: term, type: "phrasal verb" },
          { form: toPastPhrasalVerb(term), type: "phrasal verb" },
          { form: toIngPhrasalVerb(term), type: "phrasal verb" },
          ...familyEntries,
          ...derivedEntries
        ], term, normalizedPos);
      }

      return dedupeAndEnsureFormEntries([
        { form: term, type: "noun" },
        { form: toPlural(term), type: "noun" },
        ...familyEntries,
        ...derivedEntries
      ], term, "noun");
    }

    function generateLikelyForms(word, pos) {
      return generateLikelyFormEntries(word, pos).map(item => item.form);
    }

    function ensureWordIncluded(forms, word) {
      const normalizedWord = `${word || ""}`.trim();
      const set = new Set(forms.map(item => `${item}`.trim()).filter(Boolean));
      if (!set.has(normalizedWord)) {
        return [normalizedWord, ...set];
      }
      return [normalizedWord, ...Array.from(set).filter(item => item !== normalizedWord)];
    }

    function escapeRegExp(text) {
      return `${text || ""}`.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function containsHeadword(text, word) {
      const source = `${text || ""}`.toLowerCase();
      const target = `${word || ""}`.toLowerCase().trim();
      if (!source || !target) return false;
      return new RegExp(`\\b${escapeRegExp(target)}\\b`, "i").test(source);
    }

    function rootFromSuffix(term) {
      const lower = term.toLowerCase();
      const rules = [
        [/tion$|sion$/, "the process, act, or result of"],
        [/ment$/, "the result or act of"],
        [/ness$/, "the state of being"],
        [/ity$/, "the quality or condition of"],
        [/ship$/, "the status, relationship, or condition of"],
        [/ism$/, "a belief system, practice, or movement related to"],
        [/ist$/, "a person associated with"],
        [/age$/, "an amount, collection, or process connected to"],
        [/ance$|ence$/, "a state or process connected to"]
      ];

      for (const [pattern, lead] of rules) {
        if (pattern.test(lower)) {
          const base = lower.replace(pattern, "").trim() || lower;
          return { lead, base };
        }
      }
      return null;
    }

    function buildAutoMeaning(word) {
      const lower = (word || "").toLowerCase();
      if (meaningOverrides[lower]) return meaningOverrides[lower];

      const pos = guessPartOfSpeech(word);
      const term = safeTerm(word);
      if (pos === "verb") return "to perform an action, process, or change";
      if (pos === "noun") {
        const rooted = rootFromSuffix(term);
        if (rooted) return `${rooted.lead} ${rooted.base}`;
        if (/(er|or)$/.test(lower)) return "a person or thing that performs a specific role or function";
        return "a person, thing, event, or abstract concept";
      }
      if (pos === "adjective") return "describing a quality, state, or characteristic";
      if (pos === "adverb") return "in a particular manner or way";
      if (pos === "phrase") return `a multi-word expression used in formal English communication`;
      return "a person, thing, event, or abstract concept";
    }

    function buildAutoExample(word) {
      const lower = (word || "").toLowerCase();
      if (exampleOverrides[lower]) return exampleOverrides[lower];

      const pos = guessPartOfSpeech(word);
      const term = safeTerm(word);
      if (pos === "verb") return `The team will ${word} the issue during tomorrow's meeting.`;
      if (pos === "noun") return `The report explains the role of ${term} in modern society.`;
      if (pos === "adjective") {
        if (/(ing)$/.test(term)) return `It was a ${term} experience for the whole class.`;
        if (/(ed)$/.test(term)) return `She felt ${term} after hearing the final result.`;
        return `It was ${articleFor(term)} ${term} response to a complex issue.`;
      }
      if (pos === "adverb") return `The team responded ${word} to the sudden change.`;
      if (pos === "phrase") return `In class, we discussed how to use "${word}" naturally in context.`;
      return `The report explains the role of ${term} in modern society.`;
    }

    function isAutoGeneratedMeaning(meaning) {
      return /do or handle something related to|a person, thing, event, or idea called|describing a quality linked to|in a manner related to|multi-word expression|upper-intermediate english/.test((meaning || "").toLowerCase());
    }

    function isWeakMeaningText(meaning) {
      return isAutoGeneratedMeaning(meaning)
        || /a word used in upper-intermediate english|a useful english word|depends on context|called\s+[a-z-]+$/i.test(meaning || "");
    }

    function isUnsuitableMeaning(word, meaning) {
      return isWeakMeaningText(meaning) || containsHeadword(meaning, word);
    }

    function isWeakExampleText(example) {
      const text = (example || "").toLowerCase();
      return text.startsWith("the teacher used \"")
        || text.startsWith("people often use the word \"")
        || text.startsWith("the article used \"")
        || text.startsWith("the report explains the role of ")
        || /^it was an? [a-z-]+ response to a complex issue\.$/.test(text)
        || /^the situation became more [a-z-]+ over time\.$/.test(text)
        || text.includes("use \"") && text.includes("in context")
        || text === "";
    }

    let dictionaryCache = {};

    function loadDictionaryCache() {
      const raw = localStorage.getItem("vocabulary-survival-dictionary-cache");
      if (!raw) return;
      try {
        dictionaryCache = JSON.parse(raw);
      } catch (_error) {
        dictionaryCache = {};
      }
    }

    function saveDictionaryCache() {
      try {
        localStorage.setItem("vocabulary-survival-dictionary-cache", JSON.stringify(dictionaryCache));
      } catch (_error) {
        // Ignore storage quota or privacy-mode failures.
      }
    }

    function normalizeDefinitionText(text) {
      if (!text) return "";
      const cleaned = `${text}`.replace(/\s+/g, " ").trim();
      if (!cleaned) return "";
      const sentence = cleaned.endsWith(".") ? cleaned.slice(0, -1) : cleaned;
      return sentence.charAt(0).toLowerCase() + sentence.slice(1);
    }

    function normalizeExampleText(text, word) {
      const cleaned = `${text || ""}`.replace(/\s+/g, " ").trim();
      if (cleaned) return cleaned;
      return buildAutoExample(word);
    }

    async function fetchDictionaryEntry(word) {
      const key = (word || "").toLowerCase();
      if (!key) return null;
      if (dictionaryCache[key]) return dictionaryCache[key];

      try {
        const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
        if (!response.ok) {
          dictionaryCache[key] = null;
          return null;
        }
        const data = await response.json();
        const meanings = Array.isArray(data) ? data : [];
        const guessedPos = guessPartOfSpeech(word);
        const candidates = [];

        for (const entry of meanings) {
          for (const meaning of (entry.meanings || [])) {
            const part = (meaning.partOfSpeech || "").toLowerCase();
            for (const def of (meaning.definitions || [])) {
              if (!def.definition) continue;
              const definition = normalizeDefinitionText(def.definition);
              if (!definition) continue;
              const rawExample = def.example || "";
              let score = 0;

              if (rawExample) score += 4;
              if (part === guessedPos) score += 1;
              if (part === "verb" || part === "adjective") score += 1;
              if (definition.length >= 30 && definition.length <= 140) score += 2;
              if (/obsolete|archaic|dated|chiefly/i.test(definition)) score -= 4;
              if (definition.includes(";")) score -= 1;
              if (containsHeadword(definition, word)) score -= 8;

              candidates.push({ definition, rawExample, score });
            }
          }
        }

        candidates.sort((a, b) => b.score - a.score);
        const best = candidates.find(item => !containsHeadword(item.definition, word)) || candidates[0] || null;

        const resolved = {
          meaning: best?.definition || buildAutoMeaning(word),
          example: normalizeExampleText(best?.rawExample, word)
        };
        dictionaryCache[key] = resolved;
        return resolved;
      } catch (_error) {
        dictionaryCache[key] = null;
        return null;
      }
    }

    function applyDictionaryEntryToThemes(word, resolved) {
      if (!resolved) return false;
      let changed = false;
      Object.values(themes).forEach(theme => {
        theme.words.forEach(entry => {
          if (entry.word !== word) return;

          if (isUnsuitableMeaning(entry.word, entry.meaning)) {
            entry.meaning = resolved.meaning;
            changed = true;
          }
          if (isWeakExampleText(entry.example)) {
            entry.example = resolved.example;
            changed = true;
          }

          entry.formsDetailed = (entry.formsDetailed || []).map(item => {
            if (!isWeakExampleText(item.example)) return item;
            changed = true;
            return { ...item, example: buildAutoExample(item.form) };
          });
        });
      });
      return changed;
    }

    async function enrichWeakEntriesFromDictionary() {
      const uniqueWords = Array.from(new Set(
        Object.values(themes)
          .flatMap(theme => theme.words)
          .filter(entry => isUnsuitableMeaning(entry.word, entry.meaning) || isWeakExampleText(entry.example))
          .map(entry => entry.word)
      ));

      if (!uniqueWords.length) return;

      const batchSize = 8;
      let anyChanged = false;

      for (let i = 0; i < uniqueWords.length; i += batchSize) {
        const batch = uniqueWords.slice(i, i + batchSize);
        const results = await Promise.all(batch.map(word => fetchDictionaryEntry(word)));
        batch.forEach((word, index) => {
          if (applyDictionaryEntryToThemes(word, results[index])) {
            anyChanged = true;
          }
        });
        saveDictionaryCache();
      }

      if (anyChanged) {
        render();
      }
    }

    function buildAutoFormExample(form) {
      return buildAutoExample(form);
    }

    function createAutoWordEntry(word) {
      const pos = guessPartOfSpeech(word);
      const formEntries = generateLikelyFormEntries(word, pos);
      const forms = formEntries.map(item => item.form);
      return {
        word,
        pos,
        meaning: buildAutoMeaning(word),
        example: buildAutoExample(word),
        forms,
        formsDetailed: formEntries.map(item => ({
          form: item.form,
          pos: item.type,
          type: item.type,
          example: buildAutoFormExample(item.form)
        }))
      };
    }

    function normalizeWordEntry(entry) {
      const fallbackWord = (entry && entry.word) ? entry.word : "word";
      const inferredPos = (entry && entry.pos) ? entry.pos : guessPartOfSpeech(fallbackWord);
      const generatedDetailed = generateLikelyFormEntries(fallbackWord, inferredPos);
      const fromDetailed = Array.isArray(entry.formsDetailed)
        ? entry.formsDetailed.map(item => {
          const form = item && item.form ? `${item.form}`.trim() : "";
          const type = normalizeFormType(item && (item.type || item.pos))
            || inferFormType(form, inferredPos);
          const example = item && item.example ? item.example : buildAutoFormExample(form);
          return { form, type, example };
        })
        : [];
      const fromForms = Array.isArray(entry.forms)
        ? entry.forms.map(form => {
          const cleanForm = `${form || ""}`.trim();
          return {
            form: cleanForm,
            type: inferFormType(cleanForm, inferredPos),
            example: buildAutoFormExample(cleanForm)
          };
        })
        : [];

      const merged = dedupeAndEnsureFormEntries(
        [...fromDetailed, ...fromForms, ...generatedDetailed],
        fallbackWord,
        inferredPos
      );

      const formsDetailed = merged.map(item => {
        const existing = fromDetailed.find(detail => detail.form.toLowerCase() === item.form.toLowerCase());
        return {
          form: item.form,
          pos: item.type,
          type: item.type,
          example: existing?.example || buildAutoFormExample(item.form)
        };
      });
      const safeForms = formsDetailed.map(item => item.form);

      return {
        ...entry,
        word: fallbackWord,
        pos: inferredPos,
        meaning: isUnsuitableMeaning(fallbackWord, entry.meaning) ? buildAutoMeaning(fallbackWord) : (entry.meaning || buildAutoMeaning(fallbackWord)),
        example: entry.example || buildAutoExample(fallbackWord),
        forms: safeForms,
        formsDetailed
      };
    }

    function applyCuratedWordUpgrades(themeMap) {
      if (!themeMap || typeof themeMap !== "object") return;

      Object.entries(curatedWordUpgrades).forEach(([word, detail]) => {
        meaningOverrides[word] = detail.meaning;
        exampleOverrides[word] = detail.example;
      });

      Object.values(themeMap).forEach(theme => {
        if (!theme || !Array.isArray(theme.words)) return;
        theme.words = theme.words.map(entry => {
          const key = `${entry?.word || ""}`.toLowerCase().trim();
          const curated = curatedWordUpgrades[key];
          if (!curated) return entry;

          const pos = curated.pos;
          const formEntries = generateLikelyFormEntries(entry.word, pos);
          return {
            ...entry,
            pos,
            meaning: curated.meaning,
            example: curated.example,
            forms: formEntries.map(item => item.form),
            formsDetailed: formEntries.map(item => ({
              form: item.form,
              pos: item.type,
              type: item.type,
              example: buildAutoFormExample(item.form)
            }))
          };
        });
      });
    }

    function chooseThemeForWord(word, themeMap) {
      const lower = `${word || ""}`.toLowerCase();
      const override = themeAssignmentOverrides[lower];
      if (override && themeMap[override]) return override;

      for (const rule of themeAssignmentRules) {
        if (themeMap[rule.theme] && rule.pattern.test(lower)) {
          return rule.theme;
        }
      }

      const pos = guessPartOfSpeech(lower);
      if (pos === "verb" && themeMap.actions) return "actions";
      if ((pos === "adjective" || pos === "adverb") && themeMap.description) return "description";
      if (themeMap.abstract) return "abstract";
      return Object.keys(themeMap).find(key => key !== "b2master") || "feelings";
    }

    function distributeRequiredWordsAcrossThemes(themeMap, requiredWords) {
      const themeKeys = Object.keys(themeMap).filter(key => key !== "b2master");
      const existingWords = new Set();
      themeKeys.forEach(key => {
        themeMap[key].words.forEach(item => existingWords.add(item.word));
      });

      const missingWords = requiredWords.filter(word => !existingWords.has(word));
      missingWords.forEach(word => {
        const targetTheme = chooseThemeForWord(word, themeMap);
        themeMap[targetTheme].words.push(createAutoWordEntry(word));
      });
    }

    function recategorizeAllThemeWords(themeMap, requiredWords) {
      const themeKeys = Object.keys(themeMap).filter(key => key !== "b2master");
      const entryByWord = new Map();

      themeKeys.forEach(key => {
        (themeMap[key].words || []).forEach(entry => {
          const word = `${entry?.word || ""}`.trim();
          if (!word) return;
          if (!entryByWord.has(word)) {
            entryByWord.set(word, entry);
          }
        });
      });

      const required = Array.isArray(requiredWords) ? requiredWords : [];
      const allWords = Array.from(new Set([
        ...required,
        ...Array.from(entryByWord.keys())
      ]));

      themeKeys.forEach(key => {
        themeMap[key].words = [];
      });

      allWords.forEach(word => {
        const existingEntry = entryByWord.get(word);
        const safeEntry = existingEntry ? normalizeWordEntry(existingEntry) : createAutoWordEntry(word);
        const targetTheme = chooseThemeForWord(word, themeMap);
        themeMap[targetTheme].words.push(safeEntry);
      });
    }

    function normalizeAllThemeWords(themeMap) {
      Object.values(themeMap).forEach(theme => {
        theme.words = theme.words.map(normalizeWordEntry);

    function buildBestMeaningLookup(themeMap) {

      Object.entries(themeMap).forEach(([themeKey, theme]) => {
        if (themeKey === "b2master") return;
        theme.words.forEach(entry => {
          if (!lookup.has(entry.word) || isAutoGeneratedMeaning(lookup.get(entry.word).meaning)) {
            lookup.set(entry.word, {
              meaning: entry.meaning,
              example: entry.example

          }
        });

      return lookup;

    function createMasterTheme(words, meaningLookup = new Map()) {
      const sortedWords = [...words].sort((a, b) => a.localeCompare(b));

            example: detail?.example || buildAutoExample(word),

          { type: "choice", level: "easy", word: w2, prompt: `Which word is in today's B2 set?`, options: [w2, w3, w4], answer: w2, explanation: "This checks direct recognition of the list item." },
          { type: "form", level: "medium", word: w3, prompt: `Type this exact target word: ${w3}`, answer: w3, explanation: "Copy the exact spelling from the B2 list." },
          { type: "error", level: "hard", word: w4, sentence: `Correct this misspelling: ${w4}x`, answer: w4, explanation: "Remove the extra letter and keep the original target word." },
          { type: "sentence", level: "hard", word: w5, prompt: `Write one sentence using \"${w5}\".`, sample: `I used \"${w5}\" correctly in a full sentence.`, explanation: "Use the target word naturally in context." }
        ],
        story: [
          { scene: `Step 1: Select the required word \"${w1}\".`, options: [w1, w2, w3], answer: w1, note: "Correct target word selected." },
          { scene: `Step 2: Select the required word \"${w2}\".`, options: [w2, w3, w4], answer: w2, note: "Great, you identified the right item." },
          { scene: `Step 3: Select the required word \"${w3}\".`, options: [w3, w4, w5], answer: w3, note: "Perfect. Keep cycling through the full list in Learn mode." }
        ],
        passage: {
          intro: "Master list checkpoint.",
          text: `In this checkpoint, learners review [1] and [2] from the complete B2 vocabulary bank.`,
          blank1: { options: [w1, w2, w3], answer: w1 },
          blank2: { options: [w2, w3, w4], answer: w2 },
          errorSentence: `Please correct this misspelling: ${w5}x`,
          correction: w5,
          explanation: "Use the exact word from the master list.",
          speaking: "Use at least 5 different words from the B2 Master List in a short spoken response."
        }
      };
    }

    const THEMES_JSON_PATH = "vocabulary_B2_themes.json";
    let themes = {};

    async function loadBaseThemesData() {
      const bundled = getBundledThemesData();
      if (bundled && bundled.themes && typeof bundled.themes === "object") {
        themes = bundled.themes;
        const wbFromBundle = bundled.wordBank || {};
        REQUIRED_B2_WORDS = Array.isArray(wbFromBundle.requiredWords) ? wbFromBundle.requiredWords : [];
        meaningOverrides = wbFromBundle.meaningOverrides && typeof wbFromBundle.meaningOverrides === "object" ? wbFromBundle.meaningOverrides : {};
        exampleOverrides = wbFromBundle.exampleOverrides && typeof wbFromBundle.exampleOverrides === "object" ? wbFromBundle.exampleOverrides : {};
        curatedWordUpgrades = wbFromBundle.curatedWordUpgrades && typeof wbFromBundle.curatedWordUpgrades === "object" ? wbFromBundle.curatedWordUpgrades : {};
        return;
      }

      try {
        const response = await fetch(resolveAssetUrl(THEMES_JSON_PATH));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        themes = data && data.themes && typeof data.themes === "object" ? data.themes : {};
        const wb = data && data.wordBank ? data.wordBank : {};
        REQUIRED_B2_WORDS = Array.isArray(wb.requiredWords) ? wb.requiredWords : [];
        meaningOverrides = wb.meaningOverrides && typeof wb.meaningOverrides === "object" ? wb.meaningOverrides : {};
        exampleOverrides = wb.exampleOverrides && typeof wb.exampleOverrides === "object" ? wb.exampleOverrides : {};
        curatedWordUpgrades = wb.curatedWordUpgrades && typeof wb.curatedWordUpgrades === "object" ? wb.curatedWordUpgrades : {};
      } catch (error) {
        console.warn("Could not load base themes JSON.", error);
        themes = {};
        REQUIRED_B2_WORDS = [];
        meaningOverrides = {};
        exampleOverrides = {};
        curatedWordUpgrades = {};
      }
    }

    function initializeThemesFromWordBank() {

      recategorizeAllThemeWords(themes, REQUIRED_B2_WORDS);
      normalizeAllThemeWords(themes);
      applyCuratedWordUpgrades(themes);
      themes.b2master = createMasterTheme(REQUIRED_B2_WORDS, buildBestMeaningLookup(themes));
    }

    const modeFlow = ["learn", "bookmarks"];
    const modes = [
      { id: "learn", label: "Learn" },
      { id: "bookmarks", label: "Bookmarks" }
    ];

    const state = {
      theme: "feelings",
      mode: "learn",
      difficulty: "easy",
      xp: 0,
      streak: 0,
      correct: 0,
      incorrect: 0,
      answered: 0,
      weakWords: [],
      knownWords: [],
      bookmarkedWords: [],
      completedThemes: [],
      learnIndex: 0,
      flashSide: "front",
      practiceIndex: 0,
      practiceLocked: false,
      practiceFeedback: "",
      testStage: "passage",
      testPassageDone: false,
      testQuiz: [],
      quizIndex: 0,
      quizScore: 0,
      quizLocked: false,
      timeLeft: 90,
      timerId: null,
      storyIndex: 0,
      storyLocked: false,
      storyScore: 0,
      bookmarkPracticeIndex: 0,
      bookmarkPracticeLocked: false,
      bookmarkPanelOpen: false,
      bookmarkPracticeOrderKey: "",
      bookmarkPracticeQuestions: [],
      reviewOnly: false,
      learnOrderKey: "",
      learnOrder: [],
      practiceOrderKey: "",
      practiceOrder: [],
      storyOrderKey: "",
      storyOrder: [],
      masterSearch: ""
    };

    function currentTheme() {
      return themes[state.theme];
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildShuffledIndices(size) {
      return shuffle(Array.from({ length: size }, (_, index) => index));
    }

    function uniquePush(list, item) {
      if (!item) return;
      if (!list.includes(item)) list.push(item);
    }

    function saveState() {
      const data = {
        xp: state.xp,
        streak: state.streak,
        correct: state.correct,
        incorrect: state.incorrect,
        answered: state.answered,
        weakWords: state.weakWords,
        knownWords: state.knownWords,
        bookmarkedWords: state.bookmarkedWords,
        completedThemes: state.completedThemes
      };
      localStorage.setItem("vocabulary-survival-progress", JSON.stringify(data));
    }

    function loadState() {
      const raw = localStorage.getItem("vocabulary-survival-progress");
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        state.xp = parsed.xp || 0;
        state.streak = parsed.streak || 0;
        state.correct = parsed.correct || 0;
        state.incorrect = parsed.incorrect || 0;
        state.answered = parsed.answered || 0;
        state.weakWords = Array.isArray(parsed.weakWords) ? parsed.weakWords : [];
        state.knownWords = Array.isArray(parsed.knownWords) ? parsed.knownWords : [];
        state.bookmarkedWords = Array.isArray(parsed.bookmarkedWords)
          ? parsed.bookmarkedWords.map(item => `${item || ""}`.trim()).filter(Boolean)
          : [];
        state.completedThemes = Array.isArray(parsed.completedThemes) ? parsed.completedThemes : [];
      } catch (error) {
        console.warn("Could not load saved progress.", error);
      }
    }

    function isBookmarked(word) {
      return state.bookmarkedWords.includes(word);
    }

    function toggleBookmark(word) {
      if (!word) return false;
      if (!Array.isArray(state.bookmarkedWords)) {
        state.bookmarkedWords = [];
      }
      if (isBookmarked(word)) {
        state.bookmarkedWords = state.bookmarkedWords.filter(item => item !== word);
        saveState();
        return false;
      }
      uniquePush(state.bookmarkedWords, word);
      saveState();
      return true;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function addXP(amount) {
      state.xp += amount;
      saveState();
    }

    function markWeak(word) {
      uniquePush(state.weakWords, word);
      saveState();
    }

    function clearWeak(word) {
      state.weakWords = state.weakWords.filter(item => item !== word);
      saveState();
    }

    function recordAnswer(isCorrect, word) {
      state.answered += 1;
      if (isCorrect) {
        state.correct += 1;
        state.streak += 1;
        addXP(10);
        clearWeak(word);
      } else {
        state.incorrect += 1;
        state.streak = 0;
        markWeak(word);
      }
      saveState();
      renderFeedback();
    }

    function markThemeComplete() {
      if (!state.completedThemes.includes(state.theme)) {
        state.completedThemes.push(state.theme);
      }
      saveState();
    }

    function resetTransientState() {
      state.learnIndex = 0;
      state.flashSide = "front";
      state.learnOrderKey = "";
      state.learnOrder = [];
      state.practiceIndex = 0;
      state.practiceLocked = false;
      state.practiceFeedback = "";
      state.practiceOrderKey = "";
      state.practiceOrder = [];
      state.testStage = "passage";
      state.testPassageDone = false;
      state.testQuiz = [];
      state.quizIndex = 0;
      state.quizScore = 0;
      state.quizLocked = false;
      state.timeLeft = 90;
      clearInterval(state.timerId);
      state.timerId = null;
      state.storyIndex = 0;
      state.storyLocked = false;
      state.storyScore = 0;
      state.storyOrderKey = "";
      state.storyOrder = [];
      state.bookmarkPracticeIndex = 0;
      state.bookmarkPracticeLocked = false;
      state.bookmarkPanelOpen = false;
      state.bookmarkPracticeOrderKey = "";
      state.bookmarkPracticeQuestions = [];
      state.reviewOnly = false;
    }

    function setTheme(themeKey) {
      state.theme = themeKey;
      state.masterSearch = "";
      resetTransientState();
      render();
    }

    function setMode(mode) {
      state.mode = mode;
      state.practiceIndex = 0;
      state.practiceLocked = false;
      state.practiceFeedback = "";
      if (mode !== "test") {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      if (mode === "test") {
        state.testStage = "passage";
        state.testPassageDone = false;
        state.testQuiz = [];
        state.quizIndex = 0;
        state.quizScore = 0;
        state.quizLocked = false;
        state.timeLeft = 90;
      }
      if (mode === "story") {
        state.storyIndex = 0;
        state.storyLocked = false;
        state.storyScore = 0;
        state.storyOrderKey = "";
        state.storyOrder = [];
      }
      if (mode === "bookmarks") {
        state.bookmarkPracticeIndex = 0;
        state.bookmarkPracticeLocked = false;
        state.bookmarkPanelOpen = false;
        state.bookmarkPracticeOrderKey = "";
        state.bookmarkPracticeQuestions = [];
      }
      render();
    }

    function setDifficulty(level) {
      state.difficulty = level;
      state.practiceIndex = 0;
      state.practiceLocked = false;
      state.practiceFeedback = "";
      state.practiceOrderKey = "";
      state.practiceOrder = [];
      render();
    }

    function buildThemeList() {
      const themeList = document.getElementById("themeList");
      themeList.innerHTML = "";
      Object.entries(themes).forEach(([key, theme]) => {
        const btn = document.createElement("button");
        btn.className = `theme-btn ${state.theme === key ? "active" : ""}`;
        btn.innerHTML = `${theme.emoji} ${theme.name}`;
        btn.addEventListener("click", () => setTheme(key));
        themeList.appendChild(btn);
      });
    }

    function buildModeTabs() {
      const wrap = document.getElementById("modeTabs");
      wrap.innerHTML = "";
      modes.forEach(mode => {
        const btn = document.createElement("button");
        btn.className = `mode-btn ${state.mode === mode.id ? "active" : ""}`;
        if (mode.id === "bookmarks") {
          btn.textContent = `${mode.label} (${state.bookmarkedWords.length})`;
        } else {
          btn.textContent = mode.label;
        }
        btn.addEventListener("click", () => setMode(mode.id));
        wrap.appendChild(btn);
      });
    }

    function buildDifficultyRow() {
      const row = document.getElementById("difficultyRow");
      row.innerHTML = "";
      if (state.mode !== "practice") return;
      [
        ["easy", "🟢 Easy"],
        ["medium", "🟡 Medium"],
        ["hard", "🔴 Hard"]
      ].forEach(([key, label]) => {
        const btn = document.createElement("button");
        btn.className = `difficulty-btn ${state.difficulty === key ? "active" : ""}`;
        btn.textContent = label;
        btn.addEventListener("click", () => setDifficulty(key));
        row.appendChild(btn);
      });
    }

    function renderFlow() {
      const flow = document.getElementById("flowRow");
      if (!flow) return;
      flow.innerHTML = "";
      modeFlow.forEach(step => {
        const chip = document.createElement("span");
        chip.className = `flow-chip ${state.mode === step || (step === "review" && state.weakWords.length) ? "active" : ""}`;
        chip.textContent = step === "story" ? "Story Mode" : step.charAt(0).toUpperCase() + step.slice(1);
        flow.appendChild(chip);
      });
    }

    function renderFeedback() {
      const setText = (id, value) => {
        const element = document.getElementById(id);
        if (element) element.textContent = value;
      };

      const totalPossible = Object.values(themes).reduce((total, theme) => total + theme.words.length, 0);
      const progressValue = Math.min(100, Math.round((state.correct / Math.max(1, totalPossible)) * 100));
      const overallProgress = document.getElementById("overallProgress");
      if (overallProgress) overallProgress.style.width = `${progressValue}%`;
      setText("progressText", `${progressValue}%`);
      setText("xpDisplay", `⭐ ${state.xp} XP`);
      setText("streakDisplay", `🔥 ${state.streak} streak`);
      setText("currentThemeLabel", `Theme: ${currentTheme().name}`);
      setText("correctCount", state.correct);
      setText("incorrectCount", state.incorrect);
      setText("answeredCount", state.answered);
      setText("badgeCount", state.completedThemes.length);

      const weakWrap = document.getElementById("weakWords");
      if (weakWrap) {
        weakWrap.innerHTML = state.weakWords.length
          ? state.weakWords.map(word => `<span class="chip">${word}</span>`).join("")
          : `<span class="empty">No weak words yet</span>`;
      }

      const bookmarkWrap = document.getElementById("bookmarkedWords");
      if (bookmarkWrap) {
        bookmarkWrap.innerHTML = state.bookmarkedWords.length
          ? state.bookmarkedWords.slice(0, 40).map(word => `
            <span class="chip bookmark" data-word="${word}">
              ${word}
              <button class="chip-remove" data-remove-bookmark="${word}" aria-label="Remove ${word} bookmark">×</button>
            </span>
          `).join("")
          : `<span class="empty">No bookmarked words yet</span>`;

        bookmarkWrap.querySelectorAll("[data-remove-bookmark]").forEach(btn => {
          btn.addEventListener("click", event => {
            event.stopPropagation();
            const word = btn.getAttribute("data-remove-bookmark");
            if (!word) return;
            toggleBookmark(word);
            state.bookmarkPracticeOrderKey = "";
            state.bookmarkPracticeQuestions = [];
            state.bookmarkPracticeIndex = 0;
            state.bookmarkPracticeLocked = false;
            showToast(`${word} removed from bookmarks`);
            render();
          });
        });
      }

      const rewards = [];
      if (state.xp >= 30) rewards.push("Starter XP");
      if (state.xp >= 100) rewards.push("Focus Builder");
      if (state.xp >= 200) rewards.push("Vocabulary Climber");
      if (state.streak >= 5) rewards.push("Hot Streak");
      state.completedThemes.forEach(themeKey => rewards.push(`${themes[themeKey].emoji} ${themes[themeKey].name} badge`));

      const rewardsList = document.getElementById("rewardsList");
      if (rewardsList) {
        rewardsList.innerHTML = rewards.length
          ? rewards.map(item => `<span class="chip">${item}</span>`).join("")
          : `<span class="empty">Rewards will appear here</span>`;
      }

      renderFlow();
    }

    function renderLearn() {
      const theme = currentTheme();

      if (state.theme === "b2master") {
        const words = [...theme.words].sort((a, b) => a.word.localeCompare(b.word));
        const query = state.masterSearch.trim().toLowerCase();
        const filtered = query
          ? words.filter(item => item.word.toLowerCase().includes(query) || item.meaning.toLowerCase().includes(query))
          : words;

        document.getElementById("activityCard").innerHTML = `
          <div class="activity-head">
            <div>
              <div class="eyebrow">🧱 B2 Master Word Wall</div>
              <h2 class="activity-title">All words in alphabetical order</h2>
            </div>
            <div class="step-note">${filtered.length} / ${words.length} words</div>
          </div>

          <div class="card" style="margin-bottom:14px;">
            <div class="answer-box" style="margin:0;">
              <input id="masterSearchInput" type="text" placeholder="Search word or meaning..." value="${state.masterSearch.replace(/"/g, "&quot;")}" />
            </div>
            <p class="muted" style="margin:8px 0 0;">Type a word to quickly find its meaning.</p>
          </div>

          <div class="card" style="max-height:520px; overflow:auto;">
            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:10px;">
              ${filtered.map(item => `
                <div style="border:1px solid var(--line); border-radius:12px; padding:10px; background:#fff;">
                  <div style="font-weight:800; margin-bottom:4px;">${item.word}</div>
                  <div class="muted" style="font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px;">${item.pos}</div>
                  <div class="muted" style="font-size:0.86rem; margin-bottom:6px;">${item.meaning}</div>
                  <div class="muted" style="font-size:0.82rem; margin-bottom:8px;">${item.example}</div>
                  <div class="forms">${(item.formsDetailed || []).slice(0, 4).map(formItem => `<span class="chip">${formItem.form} (${formItem.pos || formItem.type || inferFormType(formItem.form, item.pos)})</span>`).join("")}</div>
                </div>
              `).join("")}
            </div>
            ${filtered.length ? "" : `<p class=\"empty\" style=\"margin-top:10px;\">No matching words found.</p>`}
          </div>
        `;

        document.getElementById("masterSearchInput").addEventListener("input", event => {
          state.masterSearch = event.target.value;
          renderLearn();
        });

        return;
      }

      const sourcePool = state.reviewOnly && state.weakWords.length
        ? theme.words.filter(item => state.weakWords.includes(item.word)).concat(theme.words.filter(item => !state.weakWords.includes(item.word)))
        : theme.words;

      const orderKey = `${state.theme}|${state.reviewOnly}|${state.weakWords.join("|")}|${sourcePool.length}`;
      if (state.learnOrderKey !== orderKey || state.learnOrder.length !== sourcePool.length) {
        state.learnOrder = buildShuffledIndices(sourcePool.length);
        state.learnOrderKey = orderKey;
        state.learnIndex = 0;
      }

      const pool = state.learnOrder.map(index => sourcePool[index]);
      const index = state.learnIndex % pool.length;
      const word = pool[index];
      const showingBack = state.flashSide === "back";
      const bookmarked = isBookmarked(word.word);

      document.getElementById("activityCard").innerHTML = `
        <div class="activity-head">
          <div>
            <div class="eyebrow">${theme.emoji} Learn Mode</div>
            <h2 class="activity-title">Understanding meaning in context</h2>
          </div>
          <div class="step-note">Card ${index + 1} / ${pool.length}</div>
        </div>

        <div class="card flashcard" id="flashcardToggle">
          ${!showingBack ? `
            <div>
              <div class="flash-word">${word.word}</div>
              <div class="flash-pos">${word.pos}</div>
              <div class="flash-hint">Tap to flip and see meaning, example, and forms.</div>
            </div>
          ` : `
            <div>
              <div class="flash-word" style="font-size:1.35rem">${word.meaning}</div>
              <div class="flash-hint">${word.example}</div>
              <div class="forms">${word.formsDetailed.map(item => `<span class="chip">${item.form} (${item.pos || item.type || inferFormType(item.form, word.pos)})</span>`).join("")}</div>
              <div style="margin-top:10px; display:grid; gap:6px;">${word.formsDetailed.map(item => `<div class="muted"><strong>${item.form}</strong> (${item.pos || item.type || inferFormType(item.form, word.pos)}): ${item.example}</div>`).join("")}</div>
            </div>
          `}
        </div>

        <div class="card-actions" style="margin-top:16px;">
          <button class="action-btn soft" id="bookmarkBtn">${bookmarked ? "★ Bookmarked" : "☆ Bookmark"}</button>
          <button class="action-btn primary" id="nextLearnBtn">Next</button>
        </div>
      `;

      document.getElementById("flashcardToggle").addEventListener("click", () => {
        state.flashSide = state.flashSide === "front" ? "back" : "front";
        renderLearn();
      });

      document.getElementById("bookmarkBtn").addEventListener("click", () => {
        const added = toggleBookmark(word.word);
        showToast(added ? `${word.word} bookmarked` : `${word.word} removed from bookmarks`);
        renderLearn();
        renderFeedback();
      });

      document.getElementById("nextLearnBtn").addEventListener("click", () => {
        state.learnIndex += 1;
        if (state.learnIndex >= pool.length) {
          state.learnIndex = 0;
          state.learnOrderKey = "";
          state.learnOrder = [];
        }
        state.flashSide = "front";
        markThemeComplete();
        render();
      });
    }

    function getFilteredPracticeBase() {
      const all = currentTheme().practice;
      if (state.difficulty === "easy") {
        return all.filter(item => item.level === "easy");
      }
      if (state.difficulty === "medium") {
        return all.filter(item => item.level === "easy" || item.level === "medium");
      }
      return all;
    }

    function getFilteredPractice() {
      const base = getFilteredPracticeBase();
      const orderKey = `${state.theme}|${state.difficulty}|${base.length}`;
      if (state.practiceOrderKey !== orderKey || state.practiceOrder.length !== base.length) {
        state.practiceOrder = buildShuffledIndices(base.length);
        state.practiceOrderKey = orderKey;
        state.practiceIndex = 0;
      }
      return state.practiceOrder.map(index => base[index]);
    }

    function renderPractice() {
      const questions = getFilteredPractice();
      const index = state.practiceIndex % questions.length;
      const item = questions[index];

      let html = `
        <div class="activity-head">
          <div>
            <div class="eyebrow">✏️ Practice Mode</div>
            <h2 class="activity-title">Active use with one task at a time</h2>
          </div>
          <div class="step-note">Question ${index + 1} / ${questions.length}</div>
        </div>
      `;

      if (item.type === "fill" || item.type === "choice") {
        html += `
          <p class="prompt">${item.prompt}</p>
          <div class="option-grid" id="practiceOptions"></div>
          <div class="feedback-note" id="practiceFeedback">Choose the best answer.</div>
          <div class="card-actions" style="margin-top:16px;">
            <button class="action-btn primary" id="practiceNextBtn">Next Question</button>
          </div>
        `;
        document.getElementById("activityCard").innerHTML = html;
        const wrap = document.getElementById("practiceOptions");
        shuffle(item.options).forEach(option => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.textContent = option;
          btn.addEventListener("click", () => {
            if (state.practiceLocked) return;
            state.practiceLocked = true;
            const correct = option === item.answer;
            recordAnswer(correct, item.word);
            Array.from(wrap.children).forEach(child => {
              child.disabled = true;
              if (child.textContent === item.answer) child.classList.add("correct");
              if (child.textContent === option && !correct) child.classList.add("incorrect");
            });
            const fb = document.getElementById("practiceFeedback");
            fb.className = `feedback-note ${correct ? "good" : "bad"}`;
            fb.innerHTML = `${correct ? "Correct" : "Try again"} · ${item.explanation}<br><strong>Answer:</strong> ${item.answer}`;
          });
          wrap.appendChild(btn);
        });
      }

      if (item.type === "form") {
        html += `
          <p class="prompt">${item.prompt}</p>
          <div class="answer-box">
            <input id="practiceInput" type="text" placeholder="Type your answer" />
            <button class="action-btn primary" id="checkPracticeInput">Check</button>
          </div>
          <div class="feedback-note" id="practiceFeedback">Use the correct word form.</div>
          <div class="card-actions" style="margin-top:16px;">
            <button class="action-btn primary" id="practiceNextBtn">Next Question</button>
          </div>
        `;
        document.getElementById("activityCard").innerHTML = html;
        document.getElementById("checkPracticeInput").addEventListener("click", () => {
          if (state.practiceLocked) return;
          state.practiceLocked = true;
          const value = document.getElementById("practiceInput").value.trim().toLowerCase();
          const correct = value === item.answer.toLowerCase();
          recordAnswer(correct, item.word);
          const fb = document.getElementById("practiceFeedback");
          fb.className = `feedback-note ${correct ? "good" : "bad"}`;
          fb.innerHTML = `${correct ? "Correct" : "Try again"} · ${item.explanation}<br><strong>Answer:</strong> ${item.answer}`;
          document.getElementById("practiceInput").disabled = true;
        });
      }

      if (item.type === "error") {
        html += `
          <p class="prompt">Find and correct the mistake in this sentence.</p>
          <div class="card">${item.sentence}</div>
          <div class="answer-box">
            <input id="practiceInput" type="text" placeholder="Type the correction" />

    function buildQuiz() {
      const words = currentTheme().words;
      const quiz = [];
      words.forEach((word, index) => {
        const otherWords = shuffle(words.filter((_, i) => i !== index).map(item => item.word));
        quiz.push({
          prompt: `Which word means: ${word.meaning}?`,
          answer: word.word,
          word: word.word,
          options: shuffle([word.word, otherWords[0], otherWords[1]].filter(Boolean))
        });
        quiz.push({
          prompt: word.example.replace(word.word, "____"),
          answer: word.word,
          word: word.word,
          options: shuffle([word.word, otherWords[2] || otherWords[0], otherWords[3] || otherWords[1] || otherWords[0]].filter(Boolean))
        });
      });
      return shuffle(quiz).slice(0, 10);
    }

    function getWordMapAcrossThemes() {
      const map = new Map();
      Object.entries(themes).forEach(([key, theme]) => {
        if (key === "b2master") return;
        (theme.words || []).forEach(entry => {
          if (!entry?.word) return;
          if (!map.has(entry.word)) map.set(entry.word, entry);
        });
      });
      return map;
    }

    function sanitizeBookmarkedWords() {
      const wordMap = getWordMapAcrossThemes();
      const before = Array.isArray(state.bookmarkedWords) ? state.bookmarkedWords.length : 0;
      if (!Array.isArray(state.bookmarkedWords)) {
        state.bookmarkedWords = [];
      }
      state.bookmarkedWords = state.bookmarkedWords
        .map(item => `${item || ""}`.trim())
        .filter(Boolean)
        .filter(word => wordMap.has(word));
      const after = state.bookmarkedWords.length;
      if (after !== before) saveState();
      return before - after;
    }

    function buildBookmarkPracticeQuestions() {
      const wordMap = getWordMapAcrossThemes();
      const selectedWords = state.bookmarkedWords
        .map(word => wordMap.get(word))
        .filter(Boolean);

      if (!selectedWords.length) return [];

      const allWords = Array.from(wordMap.keys());
      const questions = [];

      selectedWords.forEach(entry => {
        const curated = curatedWordUpgrades[`${entry.word || ""}`.toLowerCase().trim()];
        const distractors = shuffle(allWords.filter(item => item !== entry.word)).slice(0, 3);
        const options = shuffle([entry.word, ...distractors].filter(Boolean)).slice(0, 4);
        const normalizedWord = `${entry.word || ""}`.trim();
        const firstLetter = normalizedWord.charAt(0) || "?";
        const lastLetter = normalizedWord.charAt(normalizedWord.length - 1) || "?";
        const letterCount = normalizedWord.replace(/\s+/g, "").length;
        const posHint = normalizeFormType(curated?.pos || entry.pos) || inferFormType(entry.word, "noun");
        questions.push({
          type: "choice",
          word: entry.word,
          prompt: curated?.choicePrompt || `Which word means: ${entry.meaning}?`,
          answer: entry.word,
          options,
          explanation: `"${entry.word}" matches this meaning.`
        });

        const escaped = entry.word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const blanked = entry.example.replace(new RegExp(`\\b${escaped}\\b`, "gi"), "____");
        const clue = `Clues: ${posHint}; starts with "${firstLetter}", ends with "${lastLetter}", ${letterCount} letters.`;
        const formPrompt = blanked === entry.example
          ? `Type the exact bookmarked word that means: ${entry.meaning}. ${clue}`
          : `Fill the blank with the exact bookmarked word: ${blanked}\n${clue}`;
        questions.push({
          type: "form",
          word: entry.word,
          prompt: curated?.formPrompt ? `${curated.formPrompt}\n${clue}` : formPrompt,
          answer: entry.word,
          explanation: `Use the target word that matches the meaning and context.`
        });
      });

      return shuffle(questions).slice(0, Math.min(24, Math.max(6, selectedWords.length * 2)));
    }

    function getBookmarkPracticeQuestions() {
      sanitizeBookmarkedWords();
      const key = state.bookmarkedWords.join("|");
      if (state.bookmarkPracticeOrderKey !== key || !state.bookmarkPracticeQuestions.length) {
        state.bookmarkPracticeQuestions = buildBookmarkPracticeQuestions();
        state.bookmarkPracticeOrderKey = key;
        state.bookmarkPracticeIndex = 0;
      }
      return state.bookmarkPracticeQuestions;
    }

    function startQuizTimer() {
      if (state.timerId) return;
      state.timerId = setInterval(() => {
        state.timeLeft -= 1;
        const fill = document.getElementById("quizTimerFill");
        const label = document.getElementById("quizTimerLabel");
        if (fill) fill.style.width = `${Math.max(0, state.timeLeft / 90 * 100)}%`;
        if (label) label.textContent = `${state.timeLeft}s`;
        if (state.timeLeft <= 0) {
          clearInterval(state.timerId);
          state.timerId = null;
          state.testStage = "speaking";
          renderTest();
        }
      }, 1000);
    }

    function renderTest() {
      const theme = currentTheme();

      if (state.testStage === "passage") {

        btn.textContent = option;
        btn.addEventListener("click", () => {
          if (state.storyLocked) return;
          state.storyLocked = true;
          const correct = option === step.answer;
          if (correct) state.storyScore += 1;
          recordAnswer(correct, step.answer);
          Array.from(wrap.children).forEach(child => {
            child.disabled = true;
            if (child.textContent === step.answer) child.classList.add("correct");
            if (child.textContent === option && !correct) child.classList.add("incorrect");
          });
          const feedback = document.getElementById("storyFeedback");
          feedback.className = `feedback-note ${correct ? "good" : "bad"}`;
          feedback.innerHTML = `${correct ? "Correct" : "Try again"} · ${step.note}`;
          setTimeout(() => {
            state.storyIndex += 1;
            state.storyLocked = false;
            renderStory();
          }, 1100);
        });
        wrap.appendChild(btn);
      });
    }

    function renderActivity() {
      if (state.mode === "learn") return renderLearn();
      if (state.mode === "bookmarks") return renderBookmarkPractice();
      return renderLearn();
    }

    function render() {
      buildThemeList();
      buildModeTabs();
      buildDifficultyRow();
      renderActivity();
      renderFeedback();
    }

    const reviewWeakBtn = document.getElementById("reviewWeakBtn");
    if (reviewWeakBtn) {
      reviewWeakBtn.addEventListener("click", () => {
        state.reviewOnly = true;
        state.mode = "learn";
        state.learnIndex = 0;
        state.learnOrderKey = "";
        state.learnOrder = [];
        render();
      });
    }

    const clearBookmarksBtn = document.getElementById("clearBookmarksBtn");
    if (clearBookmarksBtn) {
      clearBookmarksBtn.addEventListener("click", () => {
        state.bookmarkedWords = [];
        state.bookmarkPracticeOrderKey = "";
        state.bookmarkPracticeQuestions = [];
        state.bookmarkPracticeIndex = 0;
        state.bookmarkPracticeLocked = false;
        saveState();
        render();
        showToast("Bookmarks cleared");
      });
    }

    const resetProgressBtn = document.getElementById("resetProgressBtn");
    if (resetProgressBtn) {
      resetProgressBtn.addEventListener("click", () => {
        clearInterval(state.timerId);
        localStorage.removeItem("vocabulary-survival-progress");
        state.xp = 0;
        state.streak = 0;
        state.correct = 0;
        state.incorrect = 0;
        state.answered = 0;
        state.weakWords = [];
        state.knownWords = [];
        state.bookmarkedWords = [];
        state.completedThemes = [];
        resetTransientState();
        render();
        showToast("Progress reset");
      });
    }

    async function bootstrapApp() {
      await loadBaseThemesData();
      await loadWordBankData();

      if (!Object.keys(themes).length || !REQUIRED_B2_WORDS.length) {
        showLoadError("Could not load vocabulary_B2 JSON data files.");
        return;
      }

      initializeThemesFromWordBank();
      loadDictionaryCache();
      loadState();
      sanitizeBookmarkedWords();
      render();
      enrichWeakEntriesFromDictionary();
    }

    bootstrapApp();
  </script>
</body>
