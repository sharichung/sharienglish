<!doctype html>
<html lang="zh-HK">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小組討論句型及注意事項大全 - 升中面試訓練</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', 'Heiti TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* 頁頭 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 300;
        }

        /* 主內容區 */
        .content {
            padding: 30px;
        }

        /* 簡介 */
        .intro {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .intro p {
            font-size: 15px;
            color: #34495e;
        }

        /* 分段標題 */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: #2c3e50;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        /* 卡片容器 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* 可收合卡片 */
        .card {
            background: #f8f9fa;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            font-weight: 600;
            font-size: 15px;
        }

        .card-header:hover {
            opacity: 0.95;
        }

        .card-toggle {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .card.open .card-toggle {
            transform: rotate(180deg);
        }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: white;
        }

        .card.open .card-body {
            max-height: 2000px;
        }

        .card-body-content {
            padding: 20px;
        }

        /* 句型列表 */
        .sentence-list {
            list-style: none;
        }

        .sentence-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #ffffff;
            border-left: 3px solid #f39c12;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .sentence-text {
            flex: 1;
            color: #2c3e50;
            line-height: 1.5;
        }

        .copy-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: #229954;
            transform: scale(1.05);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        /* 注意事項卡片特別樣式 */
        .tip-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #ffffff;
            border-left: 3px solid #e74c3c;
            border-radius: 4px;
            font-size: 14px;
            color: #2c3e50;
            line-height: 1.6;
        }

        .mode-toggle {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .mode-toggle:hover {
            background: #2980b9;
        }

        /* 關鍵字模式 */
        .tip-item.keyword-mode {
            background: #fff3cd;
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .tip-item.keyword-mode::before {
            content: '🔑 ';
            margin-right: 4px;
        }

        /* 練習區 */
        .practice-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 8px;
            margin-top: 30px;
            border: 2px solid #667eea;
        }

        .practice-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .practice-question {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #f39c12;
            font-size: 15px;
            color: #2c3e50;
            font-weight: 500;
        }

        .suggestion-box {
            background: #e8f4f8;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #3498db;
            display: none;
        }

        .suggestion-box.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .suggestion-label {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .suggestion-text {
            font-size: 14px;
            color: #2c3e50;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border-left: 3px solid #3498db;
        }

        .practice-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 12px;
        }

        .practice-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 動畫 */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 頁腳 */
        .footer {
            background: #ecf0f1;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            border-top: 1px solid #bdc3c7;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }

            .header p {
                font-size: 14px;
            }

            .content {
                padding: 20px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .card-header {
                font-size: 14px;
            }

            .practice-section {
                padding: 20px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-primary {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .content {
                padding: 15px;
            }

            .section-title {
                font-size: 18px;
            }

            .sentence-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .copy-btn {
                align-self: flex-start;
            }
        }
    </style>

 <body>
  <div class="container"><!-- 頁頭 -->
   <div class="header">
    <h1>🎓 小組討論句型及注意事項大全</h1>
    <p>香港升中面試訓練教材</p>

   <div class="content"><!-- 簡介 -->
    <div class="intro">
     <p>❤️ 歡迎使用本教學網頁！呢到會教你小組討論嘅實用句型同埋注意事項。建議先學習句型，再參考注意事項，最後試試練習區嘅題目，咁樣就可以更加掌握升中面試技巧啦！</p>
    </div><!-- 句型大全區 -->

    </div><!-- 練習區 -->

    <div class="practice-section">
     <h3>模擬討論題目：</h3>
     <div class="practice-question">
      「如果學校想提升同學嘅閱讀興趣，你覺得可以搞啲咩活動？請用上面學到嘅句型，試下寫一段你嘅發言。」
     </div>
     <div class="suggestion-box" id="suggestionBox">
      <div class="suggestion-label">
       💡 隨機建議句型：
      </div>
      <div class="suggestion-text" id="suggestionText"></div>
     </div><textarea class="practice-textarea" id="practiceInput" placeholder="喺呢到輸入你嘅發言，諗下用邊啲句型會更適合……"></textarea>
     <div class="btn-group"><button class="btn-primary" onclick="getRandomSuggestion()">隨機建議句型</button> <button class="btn-primary" onclick="clearPractice()" style="background: #95a5a6;">清除</button>
     </div>
    </div>
   </div><!-- 頁腳 -->
   <div class="footer">
    <p>祝各位同學面試順利！ | 此教材由中文科老師編寫，供升中面試訓練之用。</p>

                "可以分幾次發言，而唔係一次過將所有嘢講晒。咁樣可以避免長篇大論，又可以互動多啲。",
                "冇嘢好講時，可以用『我同意 + 補充』的方式接住討論，例如『我同意家明嘅講法，我想補充……』。",
                "留意其他同學有冇機會發言。如果發覺有人一直未講過嘢，可以主動邀請佢。",
                "控制講話速度，唔好太快或太慢。清晰、自然嘅語速會令人更容易理解你嘅意思。"
            ],
            "常見錯誤提醒": [
                "❌ 錯誤：淨係講『我同意』但冇解釋。✅ 正確：『我同意家明嘅講法，因為做運動真係可以幫助我哋放鬆。』",
                "❌ 錯誤：成日講『唔知』、『隨便』、『都可以』。✅ 正確：『我暫時傾向______，不過都想聽下其他同學點諗。』",
                "❌ 錯誤：完全冇回應其他同學，全程只係獨白。✅ 正確：用『頭先______提到……』、『我同意／唔同意……因為……』嚟連結。",
                "❌ 錯誤：講嘢冇條理，東一句西一句。✅ 正確：『我覺得 + 選擇 + 因為 + 原因 + 例子』。",
                "❌ 錯誤：一開始就搶住講、霸住講。✅ 正確：讓其他同學都有機會發言，適時引導佢哋加入討論。",
                "❌ 錯誤：同學講嘢時心散或顯得不耐煩。✅ 正確：認真聆聽，用眼神接觸同點頭表示支持同尊重。"

        // ====== 所有句型列表（用於練習區隨機抽選） ======
        let allSentences = [];

        // ====== 初始化 ======
        function init() {
            // 生成句型卡片
            const sentenceContainer = document.getElementById('sentenceCardsContainer');
            Object.keys(sentenceData).forEach(category => {
                sentenceContainer.appendChild(createSentenceCard(category, sentenceData[category]));
                allSentences = allSentences.concat(sentenceData[category]);
            });

            // 生成注意事項卡片
            const tipsContainer = document.getElementById('tipsCardsContainer');
            Object.keys(tipsData).forEach(category => {
                tipsContainer.appendChild(createTipsCard(category, tipsData[category]));
            });
        }

        // ====== 建立句型卡片 ======
        function createSentenceCard(category, sentences) {
            const card = document.createElement('div');
            card.className = 'card';

            const header = document.createElement('div');
            header.className = 'card-header';
            header.innerHTML = `<span>${category}</span><span class="card-toggle">▼</span>`;
            header.onclick = () => card.classList.toggle('open');

            const body = document.createElement('div');
            body.className = 'card-body';

            const bodyContent = document.createElement('div');
            bodyContent.className = 'card-body-content';

            const list = document.createElement('ul');
            list.className = 'sentence-list';

            sentences.forEach(sentence => {
                const item = document.createElement('li');
                item.className = 'sentence-item';
                item.innerHTML = `
                    <span class="sentence-text">${sentence}</span>
                    <button class="copy-btn" onclick="copySentence('${sentence.replace(/'/g, "\\'")}')">複製</button>
                `;
                list.appendChild(item);
            });

            bodyContent.appendChild(list);
            body.appendChild(bodyContent);
            card.appendChild(header);
            card.appendChild(body);

            return card;
        }

        // ====== 建立注意事項卡片 ======
        function createTipsCard(category, tips) {
            const card = document.createElement('div');
            card.className = 'card';

            const header = document.createElement('div');
            header.className = 'card-header';
            header.innerHTML = `<span>${category}</span><span class="card-toggle">▼</span>`;
            header.onclick = () => card.classList.toggle('open');

            const body = document.createElement('div');
            body.className = 'card-body';

            const bodyContent = document.createElement('div');
            bodyContent.className = 'card-body-content';

            // 模式切換按鈕
            const modeBtn = document.createElement('button');
            modeBtn.className = 'mode-toggle';
            modeBtn.textContent = '切換到關鍵字模式';
            modeBtn.onclick = (e) => {
                e.stopPropagation();
                toggleTipsMode(tipsList, modeBtn);
            };

            const tipsList = document.createElement('div');

            tips.forEach((tip, index) => {
                const tipItem = document.createElement('div');
                tipItem.className = 'tip-item';
                tipItem.textContent = tip;
                tipItem.dataset.fullText = tip;
                tipItem.dataset.keywordText = extractKeywords(tip);
                tipsList.appendChild(tipItem);
            });

            bodyContent.appendChild(modeBtn);
            bodyContent.appendChild(tipsList);
            body.appendChild(bodyContent);
            card.appendChild(header);
            card.appendChild(body);

            return card;
        }

        // ====== 複製句型功能 ======
        function copySentence(sentence) {
            navigator.clipboard.writeText(sentence).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            });
        }

        // ====== 提取關鍵字 ======
        function extractKeywords(text) {
            const keywords = [
                { pattern: /開頭先/g, keyword: '開頭先' },
                { pattern: /重點/g, keyword: '重點' },
                { pattern: /解釋/g, keyword: '解釋' },
                { pattern: /例子/g, keyword: '例子' },
                { pattern: /打斷/g, keyword: '唔打斷' },
                { pattern: /有禮/g, keyword: '有禮' },
                { pattern: /尊重/g, keyword: '尊重' },
                { pattern: /聆聽/g, keyword: '聆聽' },
                { pattern: /合作/g, keyword: '合作' },
                { pattern: /時間/g, keyword: '時間管理' },
                { pattern: /簡潔/g, keyword: '簡潔' },
                { pattern: /清楚/g, keyword: '清楚' },
                { pattern: /長篇大論/g, keyword: '避免長篇' },
                { pattern: /冇/g, keyword: '有內容' }
            ];

            let result = '';
            keywords.forEach(kw => {
                if (kw.pattern.test(text)) {
                    result += kw.keyword + ' ';
                }
            });

            return result.trim() || '💡 核心提示';
        }

        // ====== 切換注意事項模式 ======
        function toggleTipsMode(tipsList, button) {
            const items = tipsList.querySelectorAll('.tip-item');
            let isKeywordMode = button.textContent === '切換到完整模式';

            if (isKeywordMode) {
                items.forEach(item => {
                    item.classList.remove('keyword-mode');
                    item.textContent = item.dataset.fullText;
                });
                button.textContent = '切換到關鍵字模式';
            } else {
                items.forEach(item => {
                    item.classList.add('keyword-mode');
                    item.textContent = item.dataset.keywordText;
                });
                button.textContent = '切換到完整模式';
            }
        }

        // ====== 隨機建議句型 ======
        function getRandomSuggestion() {
            if (allSentences.length === 0) return;
            const randomSentence = allSentences[Math.floor(Math.random() * allSentences.length)];
            const suggestionBox = document.getElementById('suggestionBox');
            const suggestionText = document.getElementById('suggestionText');

            suggestionText.textContent = randomSentence;
            suggestionBox.classList.add('show');
        }

        // ====== 清除練習區 ======
        function clearPractice() {
            document.getElementById('practiceInput').value = '';
            document.getElementById('suggestionBox').classList.remove('show');
        }

        // ====== 頁面加載 ======
        document.addEventListener('DOMContentLoaded', init);
    </script>
